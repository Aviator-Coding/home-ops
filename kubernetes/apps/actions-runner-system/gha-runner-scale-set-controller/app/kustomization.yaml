apiVersion: kustomize.config.k8s.io/v1beta1
configMapGenerator:
- files:
  - arc-dashboard.json
  name: arc-dashboard
generatorOptions:
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "true"
kind: Kustomization
namespace: actions-runner-system
patches:
- patch: |-
    apiVersion: helm.toolkit.fluxcd.io/v2
    kind: HelmRelease
    metadata:
      name: _
    spec:
      install:
        crds: CreateReplace
        strategy:
          name: RetryOnFailure
      rollback:
        cleanupOnFail: true
        recreate: true
      upgrade:
        cleanupOnFail: true
        crds: CreateReplace
        strategy:
          name: RemediateOnFailure
        remediation:
          remediateLastFailure: true
          retries: 2
  target:
    group: helm.toolkit.fluxcd.io
    kind: HelmRelease
resources:
- ./helmrelease.yaml
- ./pdb.yaml
- ./pod-monitor.yaml
- ./prometheusrule.yaml
- ./priorityclass.yaml
