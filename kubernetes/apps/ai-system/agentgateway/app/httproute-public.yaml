---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-public
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/name: AgentGateway
    gethomepage.dev/description: "AI Agent Gateway - LLM Model Router"
    gethomepage.dev/icon: agentgateway.png
    external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
    gatus.home-operations.com/endpoint: |-
      conditions: ["[STATUS] == 200"]
      url: "https://llm.${SECRET_DOMAIN}/ui/"
spec:
  hostnames:
    - "llm.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: agentgateway-admin-ui
          namespace: ai-system
          port: 15000
