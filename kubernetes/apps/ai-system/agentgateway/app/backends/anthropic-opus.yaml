---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anthropic-opus-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: anthropic-opus-secret
    template:
      data:
        Authorization: "{{ .ANTHROPIC_API_KEY_MAX }}"
  dataFrom:
    - extract:
        key: ai-keys
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic-opus
spec:
  ai:
    provider:
      anthropic:
        model: "claude-opus-4-20250514"
  policies:
    auth:
      secretRef:
        name: anthropic-opus-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: anthropic-opus
spec:
  parentRefs:
    - name: internal
    - name: internal-noauth
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /anthropic-opus
    backendRefs:
    - name: anthropic-opus
      group: agentgateway.dev
      kind: AgentgatewayBackend
