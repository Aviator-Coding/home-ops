---
# Ollama local LLM (OpenAI-compatible, no auth required)
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: ollama
spec:
  ai:
    provider:
      openai: {}
      host: ollama.ai.svc.cluster.local
      port: 11434
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama
spec:
  parentRefs:
    - name: internal
    - name: internal-noauth
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /ollama
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: ollama
      group: agentgateway.dev
      kind: AgentgatewayBackend
