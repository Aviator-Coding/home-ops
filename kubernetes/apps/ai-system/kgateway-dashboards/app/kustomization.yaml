---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Dashboards vendored from github.com/kgateway-dev/dashboards
# (install/helm/kgateway-dashboards/dashboards) at commit
# ed6c5b2177981126a0eb9b73e919c6a59e5b839b. The upstream chart is only
# distributed via GitRepository, which flux-local cannot render; generating the
# ConfigMaps directly keeps the same in-cluster result while passing CI.
configMapGenerator:
  - name: kgateway-dashboard-agentgateway
    files:
      - agentgateway.json
  - name: kgateway-dashboard-envoy
    files:
      - envoy.json
  - name: kgateway-dashboard-kgateway
    files:
      - kgateway.json
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    grafana_folder: AI
    kustomize.toolkit.fluxcd.io/substitute: disabled
  labels:
    grafana_dashboard: "true"
