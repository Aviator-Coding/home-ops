---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  dependsOn:
    - name: rook-ceph
      namespace: rook-ceph
    - name: snapshot-controller
      namespace: kube-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    monitoring:
      enabled: true
      createPrometheusRules: true
    toolbox:
      enabled: true
    # renovate: datasource=docker depName=quay.io/ceph/ceph
    cephImage:
      repository: quay.io/ceph/ceph
      tag: v20.2.1
    cephClusterSpec:
      # Roll operator-driven OSD updates ONE AT A TIME (chart/CRD default is 20 =
      # effectively all 6 OSDs at once). With Rook bug #17224 (stale /dev/nvmeXn1 baked
      # into ROOK_BLOCK_PATH), a simultaneous OSD restart during a Ceph/Rook upgrade risks
      # several OSDs failing to re-activate at once; one-at-a-time lets each self-heal via
      # the relocate fallback against an otherwise-healthy cluster. Operator-orchestration
      # only -- applied live, no OSD restart. See docs/ceph/osd-device-path-recovery.md.
      osdMaxUpdatesInParallel: 1
      csi:
        cephfs:
          # Effective kernel CephFS mount option (CephCluster CR spec.csi.cephfs).
          # The cluster requires msgr2; ms_mode=prefer-crc pins CRC mode so the kernel
          # client connects on mon port 3300. Verified live in /proc/mounts.
          # NOTE: CephFS already uses the kernel client (ceph-csi Driver cephFsClientType
          # autodetect -> kernel on Talos 6.x); the legacy chart forceCephFSKernelClient
          # value is inert under Rook v1.20 csi-operator mode. See docs/ceph-cluster-changelog.md.
          kernelMountOptions: "ms_mode=prefer-crc"
      cephConfig:
        global:
          bdev_enable_discard: "true"
          bdev_async_discard_threads: "1"
          osd_class_update_on_start: "false"
          device_failure_prediction_mode: local

          # CephX authentication for security
          auth_client_required: "cephx"
          auth_cluster_required: "cephx"
          auth_service_required: "cephx"

          # Compression intentionally disabled: the dominant data is already
          # compressed media (video) + RBD images, which never meets the
          # required ratio, so aggressive zstd only burned CPU and added
          # write-path latency on no-PLP consumer NVMe. Per-pool settings below
          # are also set to none. See docs/ceph-performance-review.md.

        mgr:
          mgr/crash/warn_recent_interval: "7200"
          # Fix dashboard binding to listen on all interfaces
          mgr/dashboard/server_addr: "0.0.0.0"
          mgr/dashboard/server_port: "7000"

        osd:
          # Let osd_memory_target manage BlueStore cache (was overridden by a
          # hard bluestore_cache_size=2GB, which disabled autotuning and capped
          # each OSD at 2GB. Nodes have ~94GiB RAM at <30% use with only 2 OSDs
          # each, so give BlueStore a bigger cache (more onode/metadata hits ->
          # fewer disk reads). NOTE: read-cache optimization, NOT a fix for the
          # write-latency slow-ops storm (that's the no-PLP consumer drives).
          osd_memory_target: "10737418240" # 10 GiB (pod limit raised to 14Gi)
          osd_recovery_max_active: "3" # Don't overwhelm homelab hardware
          # Gentler, off-peak scrubbing for the consumer NVMe: 1 scrub per OSD
          # at a time (was 3 -> ~23 concurrent deep-scrubs cluster-wide), and
          # confine to 01:00-07:00. See docs/ceph-performance-review.md.
          osd_max_scrubs: "1"
          osd_scrub_begin_hour: "1"
          osd_scrub_end_hour: "7"
          # Prioritise client I/O over background work on latency-sensitive drives.
          osd_mclock_profile: high_client_ops

        # --- P2: pin realistic per-OSD mClock IOPS (override inflated auto-bench).
        # The startup auto-bench reported 49k-61k IOPS for EVERY OSD (config source
        # "basic" = auto-written): ~3-4x too high for the no-PLP Samsungs and ~8-12x
        # too high for the DRAM-less Lexar NM790s (osd.3/4/5) on the 4K sync-write path
        # Ceph actually uses. The three identical NM790s even benched 52.7k/55.4k/60.9k
        # (16% spread) = bench caught SLC-cache burst, not steady state. Inflated
        # capacity mis-allocates client vs background IO and feeds the slow-ops/laggy-PG
        # cascade. Values below are conservative 4K randwrite estimates per drive model
        # (NOT fio-measured); setting them persists in the mon config DB so the OSD logs
        # "Skip OSD benchmark test" and never re-benches. See docs/ceph-cluster-changelog.md P2.
        "osd.0":
          osd_mclock_max_capacity_iops_ssd: "15000" # Samsung 980 PRO 2TB
        "osd.2":
          osd_mclock_max_capacity_iops_ssd: "15000" # Samsung 980 PRO 2TB
        "osd.6":
          osd_mclock_max_capacity_iops_ssd: "15000" # Samsung 990 PRO 2TB
        "osd.3":
          osd_mclock_max_capacity_iops_ssd: "7000" # Lexar NM790 4TB (DRAM-less HMB)
        "osd.4":
          osd_mclock_max_capacity_iops_ssd: "7000" # Lexar NM790 4TB (DRAM-less HMB)
        "osd.5":
          osd_mclock_max_capacity_iops_ssd: "7000" # Lexar NM790 4TB (DRAM-less HMB)

        mds:
          # Larger CephFS metadata cache (plenty of node RAM headroom); kept
          # below the 10Gi MDS pod limit. Helps metadata-heavy CephFS ops.
          mds_cache_memory_limit: "8589934592" # 8 GiB

        client.rgw:
          # Explicitly set realm to prevent orphan default zone/zonegroup creation
          rgw_realm: ceph-objectstore
      crashCollector:
        disable: false
      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
        prometheusEndpoint: http://prometheus-operated.monitoring.svc.cluster.local:9090
      mgr:
        modules:
          - name: diskprediction_local
            enabled: true
          - name: insights
            enabled: true
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
          - name: nfs
            enabled: true
          - name: rgw
            enabled: true
        placement:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app: rook-ceph-mgr
      network:
        provider: host
        connections:
          requireMsgr2: true
      resources:
        mgr:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        mon:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 4Gi
        osd:
          requests:
            cpu: 500m
            memory: 6Gi
          limits:
            memory: 14Gi # > osd_memory_target (10Gi) + headroom; ~94GiB node RAM
        mgr-sidecar:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
      storage:
        useAllNodes: false
        useAllDevices: false
        nodes:
          - name: "talos-1"
            devices:
              - name: "/dev/disk/by-id/nvme-Lexar_SSD_NM790_4TB_NME714W100393P2202"
              - name: "/dev/disk/by-id/nvme-Samsung_SSD_980_PRO_2TB_S6B0NL0W412707M"
          - name: "talos-2"
            devices:
              - name: "/dev/disk/by-id/nvme-Samsung_SSD_990_PRO_2TB_S7KHNJ0WC55436E"
              - name: "/dev/disk/by-id/nvme-Lexar_SSD_NM790_4TB_NME714W101694P2202"
          - name: "talos-3"
            devices:
              - name: "/dev/disk/by-id/nvme-Samsung_SSD_980_PRO_2TB_S69ENL0TC06068B"
              - name: "/dev/disk/by-id/nvme-Lexar_SSD_NM790_4TB_NL1948W100519P2202"
        config:
          osdsPerDevice: "1"
      mon:
        count: 3
        allowMultiplePerNode: false
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 10Gi
            storageClassName: openebs-hostpath
        placement:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app: rook-ceph-mon
    #---------------------------------------------
    #-- Ceph Block Pool Storage configuration
    cephBlockPools:
      - name: ceph-blockpool
        enableRBDStats: true
        spec:
          failureDomain: host
          replicated:
            size: 3
          # Compression disabled (see docs/ceph-performance-review.md).
          compressionMode: none
          parameters:
            compression_mode: none
            # bulk=true: let the PG autoscaler provision a full PG complement for
            # this large data pool and scale it up gradually (gentle backfill vs a
            # hard pg_num jump). See docs/ceph-performance-review.md.
            bulk: "true"
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          parameters:
            # StorageClass parameters are IMMUTABLE — these must match the live SC
            # or the Helm upgrade fails ("field is immutable") and rolls back the
            # whole release. Compression is controlled at the pool level (above);
            # this only tags new RBD images and the pool 'none' setting governs.
            compression_mode: aggressive
            compression_algorithm: zstd
            imageFormat: "2"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4

    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      isDefault: false
      deletionPolicy: Delete
    #---------------------------------------------
    #-- Ceph File System Storage configuration
    cephFileSystems:
      - name: &cephFileSystemName ceph-filesystem
        spec:
          preserveFilesystemOnDelete: true
          metadataPool:
            failureDomain: host
            replicated:
              size: 3
            parameters:
              compression_mode: none
          dataPools:
            # Single pool for all data - identical performance on all-NVMe.
            # No deviceClass: all OSDs are one class, so pinning data0 to the
            # nvme shadow root made it the ONLY pool on root -2 while every other
            # pool uses root -1 (default) -> "overlapping roots" -> the PG
            # autoscaler skipped ALL pools. Using the default root fixes that.
            # See docs/ceph-performance-review.md.
            - name: data0
              failureDomain: host
              replicated:
                size: 3
              parameters:
                compression_mode: none
                # bulk=true: autoscaler-driven PG growth for the main CephFS data pool.
                bulk: "true"
          metadataServer:
            activeCount: 2
            activeStandby: true
            priorityClassName: system-cluster-critical
            placement:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ceph-mds
                      app.kubernetes.io/part-of: *cephFileSystemName
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 10Gi # > mds_cache_memory_limit (8Gi) + headroom

        storageClass:
          enabled: true
          isDefault: false
          name: ceph-filesystem
          pool: data0
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          parameters:
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4

    cephFileSystemVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-filesystem
      isDefault: false
      deletionPolicy: Delete
    #---------------------------------------------
    #-- Ceph Object Store configuration
    cephObjectStores:
      - name: &cephObjectStoreName ceph-objectstore
        spec:
          metadataPool:
            failureDomain: host
            replicated:
              size: 3
            parameters:
              compression_mode: none
          dataPool:
            failureDomain: host
            replicated:
              size: 3
            parameters:
              compression_mode: none
          preservePoolsOnDelete: false
          allowUsersInNamespaces:
            - "*"
          gateway:
            port: 80
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 3Gi
            # HA configuration: 2 RGW instances spread across nodes
            instances: 2
            priorityClassName: system-cluster-critical
            placement:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      app: rook-ceph-rgw
                      ceph_daemon_id: ceph-objectstore
          healthCheck:
            bucket:
              interval: 60s

        storageClass:
          enabled: true
          name: ceph-bucket
          reclaimPolicy: Delete
          parameters:
            region: us-east-1
