---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
spec:
  chartRef:
    kind: OCIRepository
    name: grafana
  interval: 30m
  timeout: 20m
  values:
    admin:
      existingSecret: grafana-admin-secret

    annotations:
      configmap.reloader.stakater.com/reload: grafana
      secret.reloader.stakater.com/reload: grafana-admin-secret

    replicas: 1

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            disableDeletion: false
            editable: true
            folder: ""
            options:
              path: /var/lib/grafana/dashboards/default
            orgId: 1
            type: file
          - name: infrastructure
            orgId: 1
            folder: Infrastructure
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/infrastructure
          - name: databases
            orgId: 1
            folder: Databases
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/databases
          - name: ai-ml
            orgId: 1
            folder: AI/ML
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/ai-ml
          - name: media
            orgId: 1
            folder: Media
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/media
          - name: downloads
            orgId: 1
            folder: Downloads
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/downloads
          - name: networking
            orgId: 1
            folder: Networking
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/networking
          - name: monitoring
            orgId: 1
            folder: Monitoring
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/monitoring
          - name: security
            orgId: 1
            folder: Security
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/security

    dashboards:
      default:
        external-dns:
          # renovate: dashboardName="External-DNS"
          gnetId: 15038
          revision: 3
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        node-exporter-full:
          # renovate: dashboardName="Node Exporter Full"
          gnetId: 1860
          revision: 40
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        smartctl-exporter:
          # renovate: depName="SMARTctl Exporter Dashboard"
          gnetId: 22604
          revision: 2
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        node-feature-discovery:
          url: https://raw.githubusercontent.com/kubernetes-sigs/node-feature-discovery/master/examples/grafana-dashboard.json
          datasource: Prometheus

        home-dashboard:
          json: |
            {
              "annotations": {
                "list": []
              },
              "description": "Homelab Dashboard - Organized by Function",
              "editable": false,
              "fiscalYearStartMonth": 0,
              "graphTooltip": 0,
              "links": [],
              "liveNow": false,
              "panels": [
                {
                  "datasource": {
                    "type": "prometheus",
                    "uid": "${datasource}"
                  },
                  "gridPos": {"h": 3, "w": 24, "x": 0, "y": 0},
                  "id": 1,
                  "options": {
                    "code": {"language": "plaintext", "showLineNumbers": false, "showMiniMap": false},
                    "content": "# 🏠 Homelab Dashboard\n\nWelcome to your reorganized Grafana! Dashboards are now organized by function.",
                    "mode": "markdown"
                  },
                  "pluginVersion": "10.3.1",
                  "targets": [],
                  "title": "",
                  "transparent": true,
                  "type": "text"
                },
                {
                  "datasource": {"type": "prometheus", "uid": "${datasource}"},
                  "gridPos": {"h": 8, "w": 8, "x": 0, "y": 3},
                  "id": 2,
                  "options": {
                    "code": {"language": "plaintext", "showLineNumbers": false, "showMiniMap": false},
                    "content": "## 🖥️ Infrastructure\n- [Cilium](/d/cilium-agent)\n- [Kubernetes](/d/k8s-views-global)\n- [Cert-manager](/d/cert-manager)\n- [TiDB](/d/tidb-cluster-summary)\n\n## 🗄️ Databases\n- [CloudNativePG](/d/cloudnative-pg)\n- [Dragonfly](/d/dragonfly-manager)\n- [EMQX](/d/emqx-overview)\n- [NATS](/d/nats-server)",
                    "mode": "markdown"
                  },
                  "title": "Infrastructure & Databases",
                  "type": "text"
                },
                {
                  "datasource": {"type": "prometheus", "uid": "${datasource}"},
                  "gridPos": {"h": 8, "w": 8, "x": 8, "y": 3},
                  "id": 3,
                  "options": {
                    "code": {"language": "plaintext", "showLineNumbers": false, "showMiniMap": false},
                    "content": "## 🤖 AI/ML\n- [AgentGateway](/d/agentgateway)\n- [LiteLLM](/d/litellm)\n- [Qdrant](/d/qdrant-observatory)\n- [Ollama](/d/ollama-llm-inference)\n\n## 🎬 Media\n- [Plex](/d/plex-media-server-exporter)\n- [Jellyfin](/d/jellyfin-media-server)\n- [Immich](/d/immich-overview)\n- [Tdarr](/d/tdarr)",
                    "mode": "markdown"
                  },
                  "title": "AI/ML & Media",
                  "type": "text"
                },
                {
                  "datasource": {"type": "prometheus", "uid": "${datasource}"},
                  "gridPos": {"h": 8, "w": 8, "x": 16, "y": 3},
                  "id": 4,
                  "options": {
                    "code": {"language": "plaintext", "showLineNumbers": false, "showMiniMap": false},
                    "content": "## 📥 Downloads\n- [Sonarr](/d/sonarr-v3)\n- [Radarr](/d/radarr-v3)\n- [Lidarr](/d/lidarr)\n- [Prowlarr](/d/prowlarr)\n\n## 🔒 Security\n- [Authentik](/d/authentik-overview)\n\n## 📊 Monitoring\n- [Prometheus](/d/prometheus-stats)\n- [Gatus](/d/gatus)",
                    "mode": "markdown"
                  },
                  "title": "Downloads, Security & Monitoring",
                  "type": "text"
                }
              ],
              "refresh": "",
              "schemaVersion": 38,
              "tags": ["home", "overview"],
              "templating": {
                "list": [
                  {
                    "current": {"selected": false, "text": "Prometheus", "value": "prometheus"},
                    "hide": 0,
                    "includeAll": false,
                    "label": "Datasource",
                    "multi": false,
                    "name": "datasource",
                    "options": [],
                    "query": "prometheus",
                    "refresh": 1,
                    "regex": "",
                    "skipUrlSync": false,
                    "type": "datasource"
                  }
                ]
              },
              "time": {"from": "now-6h", "to": "now"},
              "timepicker": {},
              "timezone": "browser",
              "title": "Home - Homelab Overview",
              "uid": "home-dashboard",
              "version": 1,
              "weekStart": ""
            }

      # victoriametrics:
      #   victoriametrics:
      #     url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/refs/heads/master/dashboards/victoriametrics.json
      #   vmagent:
      #     url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/refs/heads/master/dashboards/vmagent.json
      #   vmlogs:
      #     url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/refs/heads/master/dashboards/victorialogs.json
      #   vmalert:
      #     url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/refs/heads/master/dashboards/vmalert.json
      #   vmoperator:
      #     url: https://raw.githubusercontent.com/VictoriaMetrics/VictoriaMetrics/refs/heads/master/dashboards/operator.json

      infrastructure:
        hubble-overview:
          # renovate: dashboardName="Hubble Overview"
          gnetId: 16611
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        kube-state-metrics:
          # renovate: dashboardName="Kube-State-Metrics"
          gnetId: 13332
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        tidb-cluster:
          # renovate: dashboardName="TiDB Cluster Overview"
          gnetId: 12857
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        volsync:
          # removate: dashboardName="VolSync Dashboard"
          gnetId: 21356
          revision: 2
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
            - name: VAR_REPLICATIONDESTNAME
              value: ".*-bootstrap"

        flux-cluster:
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/cluster.json
          datasource: Prometheus

        flux-control-plane:
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/control-plane.json
          datasource: Prometheus

        flux-logs:
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/logs.json
          datasource: Prometheus

        k8s-system-api-server:
          # renovate: dashboardName="Kubernetes / System / API Server"
          gnetId: 15761
          revision: 19
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        k8s-views-global:
          # renovate: dashboardName="Kubernetes / Views / Global"
          gnetId: 15757
          revision: 43
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        k8s-views-namespaces:
          # renovate: dashboardName="Kubernetes / Views / Namespaces"
          gnetId: 15758
          revision: 43
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        k8s-views-nodes:
          # renovate: dashboardName="Kubernetes / Views / Nodes"
          gnetId: 15759
          revision: 36
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        k8s-views-pods:
          # renovate: dashboardName="Kubernetes / Views / Pods"
          gnetId: 15760
          revision: 36
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        k8s-volumes:
          # renovate: dashboardName="K8s / Storage / Volumes / Cluster"
          gnetId: 11454
          revision: 14
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

      databases:
        cloudnative-pg:
          gnetId: 20417
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        dragonfly-manager:
          # renovate: dashboardName="Dragonfly Manager"
          gnetId: 15945
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        dragonfly-scheduler:
          # renovate: dashboardName="Dragonfly Scheduler"
          gnetId: 15944
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        dragonfly-client:
          # renovate: dashboardName="Dragonfly Client"
          gnetId: 21053
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        dragonfly-seed-client:
          # renovate: dashboardName="Dragonfly Seed Client"
          gnetId: 21054
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        nats-server:
          # renovate: dashboardName="NATS Server Dashboard"
          gnetId: 16256
          revision: 2
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        ceph-cluster:
          # renovate: dashboardName="Ceph Cluster"
          gnetId: 2842
          revision: 18
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        ceph-osd:
          # renovate: dashboardName="Ceph - OSD (Single)"
          gnetId: 5336
          revision: 9
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        ceph-pools:
          # renovate: dashboardName="Ceph - Pools"
          gnetId: 5342
          revision: 9
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        emqx-authentication:
          url: https://raw.githubusercontent.com/emqx/emqx-exporter/main/grafana-dashboard/template/emqx-5/authentication.json
          datasource: Prometheus

        emqx-authorization:
          url: https://raw.githubusercontent.com/emqx/emqx-exporter/main/grafana-dashboard/template/emqx-5/authorization.json
          datasource: Prometheus

        emqx-client-events:
          url: https://raw.githubusercontent.com/emqx/emqx-exporter/main/grafana-dashboard/template/emqx-5/client-events.json
          datasource: Prometheus

        emqx-messages:
          url: https://raw.githubusercontent.com/emqx/emqx-exporter/main/grafana-dashboard/template/emqx-5/messages.json
          datasource: Prometheus

        emqx-overview:
          url: https://raw.githubusercontent.com/emqx/emqx-exporter/main/grafana-dashboard/template/emqx-5/overview.json
          datasource: Prometheus

        emqx-rule-engine-count:
          url: https://raw.githubusercontent.com/emqx/emqx-exporter/main/grafana-dashboard/template/emqx-5/rule-engine-count.json
          datasource: Prometheus

        emqx-rule-engine-rate:
          url: https://raw.githubusercontent.com/emqx/emqx-exporter/main/grafana-dashboard/template/emqx-5/rule-engine-rate.json
          datasource: Prometheus

      ai-ml:
        agentgateway:
          # renovate: dashboardName="AgentGateway Overview"
          gnetId: 24590
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        litellm:
          # renovate: dashboardName="LiteLLM"
          gnetId: 24965
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        qdrant-observatory:
          # renovate: depName="Qdrant Observatory"
          gnetId: 25152
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        ollama-llm-inference:
          # renovate: dashboardName="Ollama LLM Inference"
          gnetId: 25086
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

      media:
        plex-media-server-exporter:
          # renovate: dashboardName="plex-media-server-exporter"
          gnetId: 17891
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        jellyfin-media-server:
          # renovate: dashboardName="Homers - Media Server Dashboard"
          gnetId: 20744
          revision: 7
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        immich-overview:
          # renovate: dashboardName="Immich"
          gnetId: 22555
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        tdarr:
          # renovate: dashboardName="Tdarr"
          gnetId: 20388
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

      downloads:
        # No official grafana.com exportarr dashboards exist for Lidarr, Readarr, or Prowlarr as of 2026-04-17.
        sonarr-v3:
          # renovate: dashboardName="Sonarr v3"
          gnetId: 12530
          revision: 2
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        radarr-v3:
          # renovate: dashboardName="Radarr v3"
          gnetId: 12896
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

      monitoring:
        prometheus-stats:
          # renovate: dashboardName="Prometheus Stats"
          gnetId: 2
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        gatus:
          # renovate: dashboardName="Gatus"
          gnetId: 24379
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        unifi-insights:
          # renovate: dashboardName="UniFi-Poller: Client Insights - Prometheus"
          gnetId: 11315
          revision: 9
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        unifi-network-sites:
          # renovate: dashboardName="UniFi-Poller: Network Sites - Prometheus"
          gnetId: 11311
          revision: 5
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

        unifi-usw:
          # renovate: dashboardName="UniFi-Poller: USW Insights - Prometheus"
          gnetId: 11312
          revision: 9
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus

        unifi-uap:
          # renovate: dashboardName="UniFi-Poller: UAP Insights - Prometheus"
          gnetId: 11314
          revision: 10
          datasource:
            - name: "DS_PROMETHEUS"
              value: Prometheus

      security:
        authentik:
          # renovate: dashboardName="authentik"
          gnetId: 23043
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - access: proxy
            name: Prometheus
            type: prometheus
            uid: prometheus
            url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
            isDefault: true
            jsonData:
              prometheusType: Prometheus
          - access: proxy
            name: Loki
            type: loki
            url: http://loki-headless.monitoring.svc.cluster.local:3100
          - name: Alertmanager
            type: alertmanager
            access: proxy
            url: http://alertmanager.monitoring.svc.cluster.local:9093
            jsonData:
              implementation: prometheus

        deleteDatasources:
          - name: Alertmanager
            orgId: 1
          - name: Prometheus
            orgId: 1
          - name: Loki
            orgId: 1

    env:
      GF_ANALYTICS_CHECK_FOR_UPDATES: false
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: false
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_AUTH_ANONYMOUS_ENABLED: false
      GF_AUTH_BASIC_ENABLED: false
      GF_DATE_FORMATS_USE_BROWSER_LOCALE: true
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /tmp/dashboards/home.json
      GF_EXPLORE_ENABLED: true
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_LOG_MODE: console
      GF_NEWS_NEWS_FEED_ENABLED: false
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: natel-discrete-panel,pr0ps-trackmap-panel,panodata-map-panel
      GF_SECURITY_COOKIE_SAMESITE: grafana
      GF_SERVER_ROOT_URL: "https://{{ .Release.Name }}.${SECRET_DOMAIN}"

    grafana.ini:
      analytics:
        check_for_updates: false
        check_for_plugin_updates: false
        reporting_enabled: false
      auth.anonymous:
        enabled: true
        org_id: 1
        org_name: Main Org.
        org_role: Viewer
      dashboards:
        default_home_dashboard_path: /var/lib/grafana/dashboards/default/home-dashboard.json
      news:
        news_feed_enabled: false
    imageRenderer:
      enabled: true

    persistence:
      enabled: false

    plugins:
      - grafana-clock-panel
      - grafana-piechart-panel
      - grafana-worldmap-panel
      - natel-discrete-panel
      - pr0ps-trackmap-panel
      - vonage-status-panel
      - victoriametrics-logs-datasource
      - victoriametrics-metrics-datasource

    rbac:
      pspEnabled: false

    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/icon: grafana.svg
          gethomepage.dev/name: Grafana
          gethomepage.dev/group: Observability
          gethomepage.dev/description: Monitoring Dashboards
          gethomepage.dev/widget.type: grafana
          gethomepage.dev/widget.url: "http://grafana.${SECRET_DOMAIN}"
          gethomepage.dev/widget.username: "{{`{{HOMEPAGE_VAR_GRAFANA_USERNAME}}`}}"
          gethomepage.dev/widget.password: "{{`{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}`}}"
        enabled: true
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https

    serviceAccount:
      create: true
      autoMount: true

    serviceMonitor:
      enabled: true

    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
        label: grafana_dashboard
        folderAnnotation: grafana_folder
        provider:
          disableDelete: true
          foldersFromFilesStructure: true
      datasources:
        enabled: true
        searchNamespace: ALL
        labelValue: ""

    testFramework:
      enabled: false

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: grafana
