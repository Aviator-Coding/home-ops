---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: emqx-exporter
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: emqx-exporter-config
    creationPolicy: Owner
    template:
      data:
        # Same EMQX_EXPORTER_API_KEY/SECRET that the cluster-side
        # init-api-keys bootstrap registers in EMQX. Both sides read from
        # the same OnePassword item so they cannot drift.
        config.yaml: |
          metrics:
            target: emqx-dashboard.database.svc.cluster.local:18083
            api_key: "{{ index . "EMQX_EXPORTER_API_KEY" }}"
            api_secret: "{{ index . "EMQX_EXPORTER_API_SECRET" }}"
          # Probes intentionally omitted: the exporter's MQTT probe does
          # not support username/password and our authorization is
          # `no_match: deny`, so anonymous connect would be rejected. The
          # client-events Grafana panel that depends on probe metrics will
          # remain blank; everything else populates from /metrics.
  dataFrom:
    - extract:
        key: EMQX
