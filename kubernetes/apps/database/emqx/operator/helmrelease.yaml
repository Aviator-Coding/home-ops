
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emqx-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: emqx-operator
      # 2.3.x dropped support for EMQX OSS 5.8.x (calls Enterprise-only
      # load_rebalance API -> 404 -> readiness gate never set). See
      # emqx/emqx-operator#1202. Pin to last 2.2.x until broker moves to a
      # 2.3.x-supported version or EMQX Enterprise.
      version: 2.2.29
      sourceRef:
        kind: HelmRepository
        name: emqx-charts
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: emqx
    replicaCount: 1
    image:
      repository: ghcr.io/emqx/emqx-operator
