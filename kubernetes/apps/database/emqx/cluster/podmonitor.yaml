---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: emqx
spec:
  # Native Prometheus endpoint exposed on the dashboard port. Complements
  # the emqx-exporter ServiceMonitor for the panels that use raw EMQX
  # /api/v5/prometheus/stats series rather than the exporter's aggregates.
  selector:
    matchLabels:
      apps.emqx.io/instance: emqx
      apps.emqx.io/managed-by: emqx-operator
  podMetricsEndpoints:
    - port: dashboard
      path: /api/v5/prometheus/stats
      interval: 30s
      params:
        type: ["prometheus"]
