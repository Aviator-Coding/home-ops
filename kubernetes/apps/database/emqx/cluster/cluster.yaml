---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps.emqx.io/emqx_v2beta1.json
apiVersion: apps.emqx.io/v2beta1
kind: EMQX
metadata:
  name: emqx
spec:
  # renovate: datasource=docker depName=public.ecr.aws/emqx/emqx
  image: public.ecr.aws/emqx/emqx:5.8.9
  config:
    data: |
      authentication {
        backend = "built_in_database"
        mechanism = "password_based"
        password_hash_algorithm {
            name = "bcrypt"
        }
        user_id_type = "username"
        bootstrap_file = "/opt/init-user.json"
        bootstrap_type = "plain"
      }
      authorization {
        sources = [
          {
            type = built_in_database
            enable = true
          }
          {
            type = file
            path = "/opt/init-acl"
          }
        ]
        no_match: "deny"
      }
      # NOTE: EMQX bootstrap file path comes from EMQX_API_KEY__BOOTSTRAP_FILE
      # which the operator injects as an env var. Env wins over HOCON, so we
      # override it in coreTemplate.spec.env below; do not set it here.
  coreTemplate:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      replicas: 2
      # 2 cores, allow 1 unavailable during operator-managed rolling restarts.
      minAvailable: 1
      resources:
        requests:
          cpu: 250m
          # request == limit on memory: Erlang VM is GC-heavy, OOMKill is
          # catastrophic for cluster gossip; lock memory at the limit.
          memory: 1Gi
        limits:
          cpu: 1000m
          memory: 1Gi
      env:
        # Operator default is /opt/emqx/data/bootstrap_api_key (inside the
        # PVC mount, where we cannot mount our Secret subPath). Point EMQX
        # at the secret-mounted file the ExternalSecret renders for us.
        - name: EMQX_API_KEY__BOOTSTRAP_FILE
          value: /opt/init-api-keys
      envFrom:
        - secretRef:
            name: emqx-secret
      extraVolumeMounts:
        - name: init-user
          mountPath: /opt/init-user.json
          subPath: init-user.json
          readOnly: true
        - name: init-user
          mountPath: /opt/init-acl
          subPath: init-acl
          readOnly: true
        - name: init-user
          mountPath: /opt/init-api-keys
          subPath: init-api-keys
          readOnly: true
      extraVolumes:
        - name: init-user
          secret:
            secretName: emqx-init-user-secret
      # Persistent /opt/emqx/data so retained messages, runtime ACLs,
      # dashboard-created rules, and built_in_database additions survive
      # pod restarts. v2beta1 expects a single PersistentVolumeClaimSpec,
      # not an array.
      volumeClaimTemplates:
        accessModes:
          - ReadWriteOnce
        storageClassName: ceph-block
        resources:
          requests:
            storage: 5Gi
  listenersServiceTemplate:
    metadata:
      annotations:
        lbipam.cilium.io/ips: "10.50.0.30"
    spec:
      type: LoadBalancer
