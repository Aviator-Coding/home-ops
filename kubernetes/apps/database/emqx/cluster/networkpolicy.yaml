---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/networking.k8s.io/networkpolicy_v1.json
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: emqx-allow-monitoring
spec:
  # The first NP applied to a pod converts it to default-deny — so any rule
  # this policy doesn't enumerate gets blocked. We must list every port the
  # cluster needs (gossip + MQTT + dashboard).
  podSelector:
    matchLabels:
      apps.emqx.io/instance: emqx
      apps.emqx.io/managed-by: emqx-operator
  policyTypes:
    - Ingress
  ingress:
    # Cluster gossip / Mria / Erlang distribution between EMQX core nodes
    # in the same namespace. Without this the cluster can't form.
    - from:
        - podSelector:
            matchLabels:
              apps.emqx.io/instance: emqx
              apps.emqx.io/managed-by: emqx-operator
      ports:
        - { port: 4370, protocol: TCP }   # erlang distribution
        - { port: 4369, protocol: TCP }   # epmd
        - { port: 5369, protocol: TCP }   # cluster discovery
    # MQTT data plane is intentionally reachable from anywhere (the
    # service is a LoadBalancer at 10.50.0.30); access control is
    # enforced by EMQX's own auth + ACL.
    - ports:
        - { port: 1883, protocol: TCP }   # MQTT
        - { port: 8883, protocol: TCP }   # MQTTS
        - { port: 8083, protocol: TCP }   # WebSocket
        - { port: 8084, protocol: TCP }   # WebSocket Secure
    # Dashboard / native Prometheus metrics on :18083:
    # - Prometheus (monitoring ns) and the in-namespace exporter scrape it.
    # - The EMQX operator MUST reach it to call /api/v5/configs and similar
    #   endpoints during reconciliation; without this allowance the operator
    #   never marks pods as `apps.emqx.io/on-serving=True`, the dashboard
    #   Service stays endpoint-less, and the rollout deadlocks.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
        - podSelector:
            matchLabels:
              app: emqx-exporter
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: emqx-operator
              control-plane: controller-manager
      ports:
        - { port: 18083, protocol: TCP }
