---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-17-v4
  labels:
    pgadmin: enabled
spec:
  # Two instances while Rook-Ceph CSI nodeplugin instability on talos-3 is
  # being investigated separately. The nodeAffinity below restricts the
  # cluster to talos-1 and talos-2; with required pod-anti-affinity on
  # hostname, that caps usable instances at 2 (primary + replica).
  # Bump to 3 once talos-3 is re-included.
  instances: 2
  # renovate: datasource=docker depName=ghcr.io/tensorchord/cloudnative-pgvecto.rs versioning=docker
  imageName: ghcr.io/tensorchord/cloudnative-pgvecto.rs:17.5-v0.4.0

  # Pod and node affinity rules
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
    nodeSelector:
      kubernetes.io/os: linux
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - talos-3

  # - unsupervised: automated update of the primary once all
  #                 replicas have been upgraded (default)
  # - supervised: requires manual supervision to perform
  #               the switchover of the primary
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover

  # Storage configuration
  storage:
    size: 100Gi
    storageClass: ceph-block

  # Superuser configuration
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true

  # Recovery: bootstrap v4 from the prior cluster's Barman archive in MinIO.
  # The serverName postgres17-v3 references the externalClusters block below.
  bootstrap:
    recovery:
      source: &previousCluster postgres17-v3

  # Configuration of the PostgreSQL server
  postgresql:
    shared_preload_libraries: ["vectors.so"]
    parameters:
      max_connections: "300"
      work_mem: 64MB
      shared_buffers: 128MB

  # Pod resource boundaries
  resources:
    requests:
      cpu: 500m
    limits:
      memory: 4Gi

  # Prometheus Exporter
  monitoring:
    enablePodMonitor: true
    podMonitorMetricRelabelings:
      - {
          sourceLabels: ["cluster"],
          targetLabel: cnpg_cluster,
          action: replace,
        }
      - { regex: cluster, action: labeldrop }

  # Backup configuration — new server name for the v4 archive
  backup:
    retentionPolicy: 30d
    barmanObjectStore: &barmanObjectStore
      data:
        compression: bzip2
      wal:
        compression: bzip2
        maxParallel: 4
      destinationPath: s3://home-ops-postgres-cluster/
      endpointURL: https://nas.${SECRET_DOMAIN}:9000
      serverName: &currentCluster postgres17-v4
      s3Credentials:
        accessKeyId:
          name: cloudnative-pg-secret
          key: aws-access-key-id
        secretAccessKey:
          name: cloudnative-pg-secret
          key: aws-secret-access-key

  # External cluster reference: bootstrap.recovery reads from this archive.
  externalClusters:
    - name: *previousCluster
      barmanObjectStore:
        <<: *barmanObjectStore
        serverName: *previousCluster
