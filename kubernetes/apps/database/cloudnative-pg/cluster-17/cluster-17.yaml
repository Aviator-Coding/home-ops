---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-17
  labels:
    pgadmin: enabled
spec:
  # Three instances across talos-1/2/3 (talos-3 BIOS issue resolved 2026-04-26).
  instances: 3
  # renovate: datasource=docker depName=ghcr.io/tensorchord/cloudnative-pgvecto.rs versioning=docker
  imageName: ghcr.io/tensorchord/cloudnative-pgvecto.rs:17.5-v0.4.0

  # Pod and node affinity rules
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
    nodeSelector:
      kubernetes.io/os: linux

  # - unsupervised: automated update of the primary once all
  #                 replicas have been upgraded (default)
  # - supervised: requires manual supervision to perform
  #               the switchover of the primary
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover

  # Storage configuration
  storage:
    size: 100Gi
    storageClass: ceph-block

  # Superuser configuration
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true

  # Recovery: bootstrap postgres-17 (v5 archive) from v4's Barman archive in MinIO.
  # The serverName postgres17-v4 references the externalClusters block below.
  # This restores the cluster under its canonical name "postgres-17" after the
  # earlier emergency rebuild created it temporarily as "postgres-17-v4".
  bootstrap:
    recovery:
      source: &previousCluster postgres17-v4

  # Configuration of the PostgreSQL server
  postgresql:
    shared_preload_libraries: ["vectors.so"]
    parameters:
      max_connections: "300"
      work_mem: 64MB
      shared_buffers: 128MB

  # Pod resource boundaries
  resources:
    requests:
      cpu: 500m
    limits:
      memory: 4Gi

  # Prometheus Exporter
  monitoring:
    enablePodMonitor: true
    podMonitorMetricRelabelings:
      - {
          sourceLabels: ["cluster"],
          targetLabel: cnpg_cluster,
          action: replace,
        }
      - { regex: cluster, action: labeldrop }

  # Backup configuration — new server name. v3 was postgres17-v3, v4 was postgres17-v4,
  # this rename uses postgres17-v5 to keep the recovery archive distinct.
  backup:
    retentionPolicy: 30d
    barmanObjectStore: &barmanObjectStore
      data:
        compression: bzip2
      wal:
        compression: bzip2
        maxParallel: 4
      destinationPath: s3://home-ops-postgres-cluster/
      endpointURL: https://nas.${SECRET_DOMAIN}:9000
      serverName: &currentCluster postgres17-v5
      s3Credentials:
        accessKeyId:
          name: cloudnative-pg-secret
          key: aws-access-key-id
        secretAccessKey:
          name: cloudnative-pg-secret
          key: aws-secret-access-key

  # External cluster reference: bootstrap.recovery reads from this archive.
  externalClusters:
    - name: *previousCluster
      barmanObjectStore:
        <<: *barmanObjectStore
        serverName: *previousCluster
