---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app surrealdb
spec:
  interval: 30m
  chart:
    spec:
      chart: surrealdb
      version: 0.4.0
      sourceRef:
        kind: HelmRepository
        name: surrealdb
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # Single replica is required for the RocksDB backend: only one writer
    # can hold the data dir lock. Ceph RBD provides the HA we used to get
    # from TiKV's Raft replication, with much less storage amplification.
    replicaCount: 1

    # RWO PV must detach the old pod before the new one mounts it on rollout.
    strategy:
      type: Recreate

    image:
      repository: surrealdb/surrealdb
      pullPolicy: IfNotPresent
      # tag: Defaults to chart appVersion

    # SurrealDB configuration
    surrealdb:
      # RocksDB backend on the persistent volume mounted at /data (see
      # persistence: block below). Migrated off tikv:// to drop the
      # 9x storage amplification (TiKV Raft 3x x Ceph CRUSH 3x).
      path: "rocksdb:///data/surrealdb"

      # Authentication (from ExternalSecret)
      unauthenticated: false  # Enable auth (replaces deprecated "auth: true")

      # Logging
      log: info

      # Additional args
      extraArgs:
        - "--allow-all"  # Adjust based on security requirements
        - "--allow-funcs"

    # Service configuration
    service:
      type: ClusterIP
      port: 8000
      annotations: {}

    # This ensures credentials persist after bootstrap
    podExtraEnv:
      - name: SURREAL_USER
        valueFrom:
          secretKeyRef:
            name: surrealdb-secret
            key: username
      - name: SURREAL_PASS
        valueFrom:
          secretKeyRef:
            name: surrealdb-secret
            key: password

    # Ingress (disabled - using HTTPRoute instead)
    ingress:
      enabled: false

    # Resources
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        memory: 2Gi

    # Pod anti-affinity for HA
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: surrealdb
              topologyKey: kubernetes.io/hostname

    # Topology spread
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: surrealdb

    # route:
    # @TODO seems not to work
    #   app:
    #     annotations:
    #       gethomepage.dev/enabled: "true"
    #       gethomepage.dev/description: surrealdb
    #       gethomepage.dev/group: database
    #       # gethomepage.dev/icon: sh-kokoro.svg
    #       gethomepage.dev/name: *app
    #       gethomepage.dev/app: *app
    #       external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
    #       gatus.home-operations.com/endpoint: |-
    #         conditions: ["[STATUS] == 200"]
    #     hostnames:
    #       - "{{ .Release.Name }}.${SECRET_DOMAIN}"
    #       - sdb.${SECRET_DOMAIN}
    #     parentRefs:
    #       - name: envoy-internal
    #         namespace: network
    #         sectionName: https
    #     backendRefs:
    #       - name: surrealdb
    #         namespace: database
    #         port: 8000

    # Health checks
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 30
      periodSeconds: 10

    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 5

    # Service monitor for Prometheus
    serviceMonitor:
      enabled: true

    # RocksDB data directory backed by ceph-block. Single Ceph-replicated
    # PVC; SurrealDB no longer needs internal replication via TiKV.
    persistence:
      enabled: true
      storageClassName: ceph-block
      accessModes:
        - ReadWriteOnce
      size: 20Gi
      mountPath: /data
