---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: comfyui-output
spec:
  # CephFS RWX (csi-rwx subvolumegroup) so ComfyUI (writer) and miso-gallery
  # (reader) can mount it from any node. Restored from the temporary ceph-block
  # RWO workaround now that CephFS RWX provisioning is fixed (PR #977).
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 25Gi
  storageClassName: ceph-filesystem-rwx
