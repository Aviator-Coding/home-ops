---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Hermes web-dashboard basic-auth credentials. The agent's dashboard can run
# arbitrary commands via its terminal backends, so it must NOT be exposed
# unauthenticated - basic auth is the minimum gate (swap to Authentik OIDC
# later via HERMES_DASHBOARD_OIDC_* if desired).
#
# 1Password item `hermes` fields:
#   HERMES_DASHBOARD_USER      - dashboard login username
#   HERMES_DASHBOARD_PASSWORD  - dashboard login password
#   HERMES_DASHBOARD_SECRET    - session-signing secret (e.g. `openssl rand -hex 32`)
#   API_SERVER_KEY             - bearer key for the OpenAI-compatible API (:8642)
#   HOMELAB_GH_TOKEN           - GitHub PAT (public_repo) for the commit-watcher skill
#   DISCORD_WEBHOOK            - Discord webhook URL the commit-watcher posts to
#   TELEGRAM_BOT_TOKEN         - BotFather token for the Telegram bot
#   TELEGRAM_ALLOWED_USERS    - comma-separated numeric user ids allowed to DM it
# 1Password item `agentmemory` field:
#   AGENTMEMORY_SECRET         - shared bearer secret for the agentmemory service
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        HERMES_DASHBOARD_BASIC_AUTH_USERNAME: "{{ .HERMES_DASHBOARD_USER }}"
        HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: "{{ .HERMES_DASHBOARD_PASSWORD }}"
        HERMES_DASHBOARD_BASIC_AUTH_SECRET: "{{ .HERMES_DASHBOARD_SECRET }}"
        # OpenAI-compatible API server bearer key (API_SERVER_ENABLED in helmrelease).
        API_SERVER_KEY: "{{ .API_SERVER_KEY }}"
        # Shared bearer secret for the agentmemory service (1Password item `agentmemory`).
        AGENTMEMORY_SECRET: "{{ .AGENTMEMORY_SECRET }}"
        # homelab-commit-watcher skill: GitHub PAT (public_repo) + Discord webhook.
        # Named HOMELAB_GH_TOKEN (not GH_TOKEN) — Hermes scrubs provider-cred names.
        HOMELAB_GH_TOKEN: "{{ .HOMELAB_GH_TOKEN }}"
        DISCORD_WEBHOOK: "{{ .DISCORD_WEBHOOK }}"
        # Telegram bot: BotFather token + comma-separated allowed numeric user ids.
        TELEGRAM_BOT_TOKEN: "{{ .TELEGRAM_BOT_TOKEN }}"
        TELEGRAM_ALLOWED_USERS: "{{ .TELEGRAM_ALLOWED_USERS }}"
  dataFrom:
    - extract:
        key: hermes
    - extract:
        key: agentmemory
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Git credentials for the agent, rendered as a `.git-credentials` file that the
# git `store` helper reads (the raw token never appears in a remote URL or env).
#
# Scope: use a GitHub *fine-grained* PAT restricted to "Only select
# repositories" -> the single repo Hermes should touch, with Contents:
# Read/Write. This is what keeps every other repo invisible - a classic PAT
# would expose all repos the account can see.
#
# 1Password item `hermes` field:
#   GITHUB_LLM_WIKI_TOKEN - github_pat_... (fine-grained, single-repo, Contents: R/W)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name hermes-git
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        # Host-level entry. The token is repo-scoped server-side by GitHub, so
        # even though git may offer it for any github.com URL, GitHub rejects it
        # for anything outside the selected repo.
        .git-credentials: "https://x-access-token:{{ .GITHUB_LLM_WIKI_TOKEN }}@github.com"
  dataFrom:
    - extract:
        key: hermes
