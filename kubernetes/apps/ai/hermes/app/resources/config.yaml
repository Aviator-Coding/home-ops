# Hermes runtime config — GitOps source of truth.
#
# The `copy-config` initContainer (helmrelease.yaml) copies this to
# /opt/data/config.yaml on EVERY pod start (overwriting any in-pod edits), and
# reloader restarts the pod when this ConfigMap changes. Change models/providers
# HERE, in Git — NOT via `hermes model` / `hermes config edit`, whose writes are
# wiped on the next restart.
custom_providers:
  # OpenCode Go (open models) via the internal agentgateway. The keyless
  # internal-noauth gateway injects the real opencodego key, so no api_key here.
  # Referenced elsewhere as `custom:gateway`.
  - name: gateway
    base_url: http://internal-noauth.ai.svc.cluster.local/opencodego/v1
    api_mode: chat_completions

# Default serving model: Grok via the native xai-oauth provider (subscription;
# creds added once with `hermes auth add xai-oauth --manual-paste`, kept in
# /opt/data/auth.json). To serve kimi through the gateway instead, set:
#   model: { default: kimi-k2.6, provider: custom:gateway }
model:
  default: grok-4.3
  provider: xai-oauth

# Fail-over chain: if the default provider 429s/errors (the Grok subscription, or
# the OpenCode-Go GoUsageLimitError), fall back to kimi via the gateway.
fallback_providers:
  - provider: custom:gateway
    model: kimi-k2.6

# Route heavy, frequent context chores to the cheap gateway model so they don't
# burn the Grok subscription. `vision` is left on the default (grok-4.3) unless
# kimi-k2.6 gains vision support.
auxiliary:
  compression:
    provider: custom:gateway
    model: kimi-k2.6
  web_extract:
    provider: custom:gateway
    model: kimi-k2.6
  session_search:
    provider: custom:gateway
    model: kimi-k2.6
  title_generator:
    provider: custom:gateway
    model: kimi-k2.6

# Web search via the SearXNG instance already running in ns ai.
web:
  search_backend: searxng

# Persistent cross-session memory via the agentmemory service (ns ai). The plugin
# code is mounted at /opt/hermes/plugins/agentmemory (see helmrelease.yaml); the
# AGENTMEMORY_URL / AGENTMEMORY_SECRET env wire it to the service.
plugins:
  enabled:
    - agentmemory

memory:
  # `plugins.enabled` only LOADS the plugin (registers the provider); this line
  # ACTIVATES agentmemory as the active memory backend so its session hooks fire.
  # Without it Hermes shows `memory: provider (none)` and captures nothing.
  provider: agentmemory
  auto_migrate: true

# Messaging platforms. The gateway-default profile starts the Telegram platform
# when TELEGRAM_BOT_TOKEN is present (from the hermes secret); TELEGRAM_ALLOWED_USERS
# gates who may DM it. platform_toolsets controls which tools each surface gets.
platform_toolsets:
  cli:
    - hermes-cli
  telegram:
    - hermes-telegram
telegram:
  require_mention: false
