# Hermes runtime config — GitOps source of truth.
#
# The `copy-config` initContainer (helmrelease.yaml) copies this to
# /opt/data/config.yaml on EVERY pod start (overwriting any in-pod edits), and
# reloader restarts the pod when this ConfigMap changes. Change models/providers
# HERE, in Git — NOT via `hermes model` / `hermes config edit`, whose writes are
# wiped on the next restart.
custom_providers:
  # OpenCode Go (open models) via the internal agentgateway. The keyless
  # internal-noauth gateway injects the real opencodego key, so no api_key here.
  # Referenced elsewhere as `custom:gateway`.
  - name: gateway
    base_url: http://internal-noauth.ai.svc.cluster.local/opencodego/v1
    api_mode: chat_completions
  # Local Qwen3.6-35B-A3B on the B70 (llama.cpp SYCL, ~74 t/s) via the gateway's
  # /vllm route. Free and rate-limit-proof; llama-server is single-slot, so
  # concurrent requests queue. Referenced as `custom:local`.
  - name: local
    base_url: http://internal-noauth.ai.svc.cluster.local/vllm/v1
    api_mode: chat_completions

# Default serving model: the local Qwen3.6-35B-A3B on the B70 (custom:local ->
# /vllm route). Free and rate-limit-proof, so long-running tasks never hit the
# xAI subscription throttle or the OpenCode-Go GoUsageLimitError. To serve a
# cloud model instead, set e.g. model: { default: grok-4.3, provider: xai-oauth }.
model:
  default: qwen3.6-35b-a3b
  provider: custom:local

# Fail-over chain: if the local B70 model errors or is unavailable (e.g. ComfyUI
# scaled vllm to 0 under the Dedicated-VRAM runbook), fall back to kimi via the
# gateway, then to Grok (xai-oauth subscription; creds added once with
# `hermes auth add xai-oauth --manual-paste`, kept in /opt/data/auth.json).
fallback_providers:
  - provider: custom:gateway
    model: kimi-k2.6
  - provider: xai-oauth
    model: grok-4.3

# Heavy, frequent context chores run on the local model too, so they don't burn
# the cloud limits either (the llama-server is single-slot, so these serialize
# behind the main task). `vision` is the exception: the local 35B is text-only,
# so image inputs are pinned to Grok (the only vision-capable provider here).
auxiliary:
  compression:
    provider: custom:local
    model: qwen3.6-35b-a3b
  web_extract:
    provider: custom:local
    model: qwen3.6-35b-a3b
  session_search:
    provider: custom:local
    model: qwen3.6-35b-a3b
  title_generator:
    provider: custom:local
    model: qwen3.6-35b-a3b
  vision:
    provider: xai-oauth
    model: grok-4.3

# Web search via the SearXNG instance already running in ns ai.
web:
  search_backend: searxng

# Aggregated MCP tools via the ToolHive VirtualMCPServer (ns ai). The vmcp
# "mcp-gateway-internal" federates every MCPServer in the `mcp-tools` group
# (arr, comfyui, flux, github, kubectl, memory, talos) behind one streamable-
# http endpoint at /mcp; incomingAuth is anonymous so no header is needed. Tool
# names are prefixed per backend ({workload}_). Deployed by
# kubernetes/apps/ai/toolhive. (joryirving routes this through litellm /mcp;
# litellm is retired here, so connect straight to the vmcp service.)
mcp_servers:
  toolhive:
    url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
    enabled: true

# Persistent cross-session memory via the agentmemory service (ns ai). The memory-
# provider plugin is mounted at $HERMES_HOME/plugins/agentmemory (=/opt/data/plugins/
# agentmemory, see helmrelease.yaml) — the user-installed dir the memory loader scans;
# AGENTMEMORY_URL / AGENTMEMORY_SECRET env wire it to the service. `memory.provider`
# below ACTIVATES it (without it Hermes shows `provider: none` and captures nothing).
# NOTE: this is the memory-provider system, NOT the general `plugins.enabled` hook
# system — don't add agentmemory there.
memory:
  provider: agentmemory
  auto_migrate: true

# Messaging platforms. The gateway-default profile starts the Telegram platform
# when TELEGRAM_BOT_TOKEN is present (from the hermes secret); TELEGRAM_ALLOWED_USERS
# gates who may DM it. platform_toolsets controls which tools each surface gets.
platform_toolsets:
  cli:
    - hermes-cli
  telegram:
    - hermes-telegram
telegram:
  require_mention: false
