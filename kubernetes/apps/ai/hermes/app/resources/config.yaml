# Hermes runtime config — GitOps source of truth.
#
# The `copy-config` initContainer (helmrelease.yaml) copies this to
# /opt/data/config.yaml on EVERY pod start (overwriting any in-pod edits), and
# reloader restarts the pod when this ConfigMap changes. Change models/providers
# HERE, in Git — NOT via `hermes model` / `hermes config edit`, whose writes are
# wiped on the next restart.
custom_providers:
  # OpenCode Go (open models) via the internal agentgateway. The keyless
  # internal-noauth gateway injects the real opencodego key upstream, so the
  # `api_key` below is a dummy — it's never sent on the wire (the gateway
  # overrides Authorization). It exists only so the auxiliary client can resolve
  # a credential: without it Hermes logs "no resolvable api_key" warnings.
  # NOTE: the value must NOT be `no-key-required`/`no-key`/`` — Hermes' v11→12
  # config migration (custom_providers→providers dict) drops exactly those
  # sentinels, so the key would vanish and the warning return. `no-auth` survives.
  # Referenced elsewhere as `custom:gateway`.
  - name: gateway
    base_url: http://internal-noauth.ai.svc.cluster.local/opencodego/v1
    api_key: no-auth
    api_mode: chat_completions
  # Local Qwen3.6-35B-A3B on the B70 (llama.cpp SYCL, ~74 t/s) via the gateway's
  # /vllm route. Free and rate-limit-proof; llama-server is single-slot, so
  # concurrent requests queue. The keyless internal-noauth route needs no auth;
  # `api_key` is a dummy to satisfy the auxiliary client's credential resolution
  # (silences the no-key warning, no 401 since the route is unauthenticated).
  # Same migration caveat as above — `no-auth`, never the `no-key-required` sentinel.
  # Referenced as `custom:local`.
  - name: local
    base_url: http://internal-noauth.ai.svc.cluster.local/vllm/v1
    api_key: no-auth
    api_mode: chat_completions

# Default serving model: the local Qwen3.6-35B-A3B on the B70 (custom:local ->
# /vllm route). Free and rate-limit-proof, so long-running tasks never hit the
# xAI subscription throttle or the OpenCode-Go GoUsageLimitError. To serve a
# cloud model instead, set e.g. model: { default: grok-4.3, provider: xai-oauth }.
model:
  default: qwen3.6-35b-a3b
  provider: custom:local

# Fail-over chain for the MAIN agentic loop: if the local B70 model errors or is
# unavailable (e.g. ComfyUI scaled vllm to 0 under the Dedicated-VRAM runbook),
# fall back to glm-5.1 via the gateway, then to Grok (xai-oauth subscription;
# creds added once with `hermes auth add xai-oauth --manual-paste`, kept in
# /opt/data/auth.json). glm-5.1 is the strongest tool-caller on the OpenCode-Go
# sub (tops τ²-bench / BFCL agentic vs kimi/deepseek/qwen), which matters because
# this fallback runs the full tool-calling loop. The aux chores below stay on
# kimi-k2.6 — they only summarise content, they don't tool-call.
fallback_providers:
  - provider: custom:gateway
    model: glm-5.1
  - provider: xai-oauth
    model: grok-4.3

# Auxiliary context chores run on kimi via the gateway, NOT the local model:
# web_extract fires N parallel LLM calls (one per fetched page) on large content,
# and the single-slot local llama-server serialized them until they timed out.
# kimi handles concurrency, and aux volume is low (bursty, per-task) so it won't
# burn the cloud limits the way the continuous main loop did. IMPORTANT: aux
# fallback uses the PER-TASK `fallback_chain`, NOT the global `fallback_providers`
# above — without it Hermes falls back to the main model (=custom:local) and
# re-times-out, so the heavy chores pin a Grok fallback (also parallel-capable).
# `vision` is pinned to Grok because the local 35B is text-only.
auxiliary:
  web_extract:
    provider: custom:gateway
    model: kimi-k2.6
    fallback_chain:
      - provider: xai-oauth
        model: grok-4.3
  compression:
    provider: custom:gateway
    model: kimi-k2.6
    fallback_chain:
      - provider: xai-oauth
        model: grok-4.3
  session_search:
    provider: custom:gateway
    model: kimi-k2.6
  title_generator:
    provider: custom:gateway
    model: kimi-k2.6
  vision:
    provider: xai-oauth
    model: grok-4.3

# Web search via the SearXNG instance already running in ns ai.
web:
  search_backend: searxng

# Aggregated MCP tools via the ToolHive VirtualMCPServer (ns ai). The vmcp
# "mcp-gateway-internal" federates every MCPServer in the `mcp-tools` group
# (arr, comfyui, flux, github, kubectl, memory, talos) behind one streamable-
# http endpoint at /mcp; incomingAuth is anonymous so no header is needed. Tool
# names are prefixed per backend ({workload}_). Deployed by
# kubernetes/apps/ai/toolhive. (joryirving routes this through litellm /mcp;
# litellm is retired here, so connect straight to the vmcp service.)
mcp_servers:
  toolhive:
    url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
    enabled: true

# Persistent cross-session memory via the agentmemory service (ns ai). The memory-
# provider plugin is mounted at $HERMES_HOME/plugins/agentmemory (=/opt/data/plugins/
# agentmemory, see helmrelease.yaml) — the user-installed dir the memory loader scans;
# AGENTMEMORY_URL / AGENTMEMORY_SECRET env wire it to the service. `memory.provider`
# below ACTIVATES it (without it Hermes shows `provider: none` and captures nothing).
# NOTE: this is the memory-provider system, NOT the general `plugins.enabled` hook
# system — don't add agentmemory there.
memory:
  provider: agentmemory
  auto_migrate: true

# Messaging platforms. The gateway-default profile starts the Telegram platform
# when TELEGRAM_BOT_TOKEN is present (from the hermes secret); TELEGRAM_ALLOWED_USERS
# gates who may DM it. platform_toolsets controls which tools each surface gets.
platform_toolsets:
  cli:
    - hermes-cli
  telegram:
    - hermes-telegram
telegram:
  require_mention: false
