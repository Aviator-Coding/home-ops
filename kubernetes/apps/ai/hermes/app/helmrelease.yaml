---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      hermes:
        # Single source of truth at /opt/data (sessions/memories/skills) is not
        # safe for concurrent writers -> exactly one replica, recreate on update.
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Seed /opt/data/config.yaml from the hermes-config-seed ConfigMap, but
          # ONLY if it doesn't exist yet -> Hermes owns the file thereafter
          # (`hermes model` / `config edit` write to it). To re-seed: edit the
          # ConfigMap and `rm /opt/data/config.yaml`, then restart. Runs as root
          # (pod default) so it can chown the file to the dropped 10000 user.
          seed-config:
            image:
              repository: docker.io/library/busybox
              tag: "1.38"
            command:
              - sh
              - -c
              - |
                set -eu
                if [ -f /opt/data/config.yaml ]; then
                  echo "[seed] /opt/data/config.yaml exists - leaving it untouched"
                else
                  echo "[seed] writing /opt/data/config.yaml from ConfigMap"
                  cp /seed/config.yaml /opt/data/config.yaml
                  chown 10000:10000 /opt/data/config.yaml
                  chmod 0644 /opt/data/config.yaml
                fi
            securityContext:
              runAsUser: 0
              runAsGroup: 0
        containers:
          app:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.6.5
            # Start the long-running gateway server (matches upstream docker usage).
            args: ["gateway", "run"]
            env:
              # --- LLM backend ---
              # Model + provider routing live in /opt/data/config.yaml, seeded by
              # the `seed-config` initContainer from the `hermes-config-seed`
              # ConfigMap (see configmap.yaml): a named `custom:gateway` provider
              # points at the internal agentgateway, and the native `xai-oauth`
              # provider serves the Grok subscription (creds in /opt/data/auth.json
              # via `hermes auth add xai-oauth --manual-paste`).
              #
              # The old OPENAI_BASE_URL / OPENAI_API_KEY / OPENAI_MODEL env were
              # REMOVED on purpose: OPENAI_BASE_URL is a global OpenAI-SDK override
              # that hijacked the endpoint for EVERY provider (it pinned grok-4.3
              # to /opencodego). Per-provider base_url in config.yaml is the right
              # layer; OPENAI_BASE_URL only ever applied to the `openai-api`
              # provider, which we no longer use. If Hermes ever refuses to boot
              # without an OpenAI key, re-add a dummy `OPENAI_API_KEY` ONLY (never
              # OPENAI_BASE_URL).
              # --- Web dashboard (chat / management UI) on :9119 ---
              HERMES_DASHBOARD: "1"
              HERMES_DASHBOARD_HOST: 0.0.0.0
              HERMES_DASHBOARD_PORT: "9119"
              # --- Run as the image's default `hermes` user. The s6 init starts
              # as root, chowns /opt/data, then drops to UID 10000. ---
              HERMES_UID: "10000"
              HERMES_GID: "10000"
              # --- Git access (single private repo). Inject a global git config
              # via env (no writable $HOME needed): the `store` helper reads the
              # token from the mounted `.git-credentials` file (see persistence
              # below), and a commit identity is set for write access. The token
              # is a fine-grained PAT scoped to ONE repo (hermes-git secret), so
              # this grants no access to any other repo. ---
              GIT_CONFIG_COUNT: "3"
              GIT_CONFIG_KEY_0: credential.helper
              GIT_CONFIG_VALUE_0: store --file=/secrets/git/.git-credentials
              GIT_CONFIG_KEY_1: user.name
              GIT_CONFIG_VALUE_1: Hermes Agent
              GIT_CONFIG_KEY_2: user.email
              GIT_CONFIG_VALUE_2: hermes@users.noreply.github.com
            envFrom:
              # Dashboard basic-auth credentials (HERMES_DASHBOARD_BASIC_AUTH_*).
              - secretRef:
                  name: *app
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &dash 9119
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *dash
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  # Generous: first boot initialises config/skills under /opt/data.
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        # s6 starts as root then drops to 10000; fsGroup makes the ceph-block
        # PVC group-writable so the dropped user owns its state at /opt/data.
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *dash
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://hermes.${SECRET_DOMAIN}/
            conditions:
              # Dashboard 302-redirects unauthenticated requests to its login.
              - "[STATUS] == any(200, 302, 401)"
            group: ai
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /opt/data
      # Single private-repo git token, rendered as `.git-credentials` by the
      # hermes-git ExternalSecret and read by the git `store` helper (see
      # GIT_CONFIG_* env above). reloader restarts the pod on token rotation.
      git-credentials:
        type: secret
        name: hermes-git
        globalMounts:
          - path: /secrets/git/.git-credentials
            subPath: .git-credentials
            readOnly: true
      # config.yaml template for the seed-config initContainer (mounted only
      # there, read-only). The PVC `data` globalMount gives that init container
      # /opt/data so it can write the seeded file.
      config-seed:
        type: configMap
        name: hermes-config-seed
        advancedMounts:
          hermes:
            seed-config:
              - path: /seed
                readOnly: true
