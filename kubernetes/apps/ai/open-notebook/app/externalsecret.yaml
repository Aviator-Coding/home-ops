---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-notebook
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: open-notebook
    template:
      engineVersion: v2
      data:
        # SurrealDB Connection
        SURREAL_URL: "ws://surrealdb.database.svc.cluster.local:8000/rpc"
        SURREAL_USER: "{{ .SURREALDB_ROOT_USER }}"
        SURREAL_PASSWORD: "{{ .SURREALDB_ROOT_PASSWORD }}"
        SURREAL_NAMESPACE: "open_notebook"
        SURREAL_DATABASE: "production"
        # AI Provider Keys (at least one required)
        #OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        #ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"
        # Optional: Additional AI providers
        # GOOGLE_API_KEY: "{{ .GOOGLE_API_KEY }}"
        # GROQ_API_KEY: "{{ .GROQ_API_KEY }}"
        # OPENROUTER_API_KEY: "{{ .OPENROUTER_API_KEY }}"
        # Optional: ElevenLabs for voice
        # ELEVENLABS_API_KEY: "{{ .ELEVENLABS_API_KEY }}"
        # Optional: Ollama local models
        OLLAMA_API_BASE: "http://ollama:11434"
        # agentgateway internal-noauth injects the real provider key; the
        # client just needs a non-empty placeholder.
        OPENAI_COMPATIBLE_API_KEY: "agentgateway-noauth"
        # Optional: Security
        OPEN_NOTEBOOK_PASSWORD: "{{ .OPEN_NOTEBOOK_PASSWORD }}"
        # Application settings
        # Unified model-routing endpoint via agentgateway (root base URL; the
        # client appends /v1/...). One endpoint serves every provider — the
        # gateway routes by the request `model` field, so set Open-Notebook's
        # models (in-app) to routable ids: gpt-*/claude-*/gemini-*/grok-*/
        # deepseek-*/qwen3.6-35b-a3b/llama-*.
        OPENAI_COMPATIBLE_BASE_URL: "http://internal-noauth.ai.svc.cluster.local"
        LOG_LEVEL: "INFO"
        MAX_UPLOAD_SIZE: "100MB"
        ENABLE_ANALYTICS: "false"
  dataFrom:
    - extract:
        key: open-notebook
    - extract:
        key: surrealdb
