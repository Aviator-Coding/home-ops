---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app agentmemory
  namespace: &namespace ai
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: onepassword-store
      namespace: security
    # Embeddings + consolidation LLM are served by the local models on the B70
    # via the agentgateway's no-auth internal listener (root /v1/* routes).
    - name: vllm
      namespace: *namespace
    - name: agentgateway
      namespace: *namespace
  interval: 1h
  path: ./kubernetes/apps/ai/agentmemory/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_SCHEDULE_CEPH: "20 */4 * * *"
      VOLSYNC_SCHEDULE_MINIO: "20 */6 * * *"
      VOLSYNC_SCHEDULE_R2: "40 2 * * *"
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false
