---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Shared bearer secret between the agentmemory service and the Hermes plugin
# (the plugin sends `Authorization: Bearer $AGENTMEMORY_SECRET`). The same value
# is templated into the `hermes` secret by hermes/app/externalsecret.yaml.
#
# 1Password item `agentmemory` field:
#   AGENTMEMORY_SECRET - random shared secret (e.g. `openssl rand -hex 32`)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name agentmemory
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        AGENTMEMORY_SECRET: "{{ .AGENTMEMORY_SECRET }}"
  dataFrom:
    - extract:
        key: agentmemory
