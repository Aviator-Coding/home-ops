---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app agentmemory
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    controllers:
      agentmemory:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/joryirving/agentmemory
              tag: 0.9.27@sha256:8f39fc9c49dc1fa9566e6a23247538be8d19b48dc8e463fb93ec58715bec1be4
            # Seed a non-interactive preferences.json so the server skips its
            # first-run splash/install prompts, then exec the real entrypoint.
            command:
              - /usr/bin/catatonit
              - --
              - /bin/sh
              - -c
              - |
                PREFS_HOME="${HOME:-/home/node}"
                mkdir -p "$PREFS_HOME/.agentmemory"
                if [ ! -s "$PREFS_HOME/.agentmemory/preferences.json" ]; then
                  printf '%s\n' '{"schemaVersion":1,"lastAgent":null,"lastAgents":[],"lastProvider":null,"skipSplash":true,"skipNpxHint":true,"skipGlobalInstall":true,"skipConsoleInstall":true,"firstRunAt":"1970-01-01T00:00:00.000Z"}' > "$PREFS_HOME/.agentmemory/preferences.json"
                fi
                exec /entrypoint.sh
            env:
              AGENTMEMORY_DROP_STALE_INDEX: "true"
              AGENTMEMORY_TOOLS: all
              III_REST_PORT: "3111"
              RUST_LOG: warn
              # The viewer (:3113) rejects any Host/Origin not in its allow-list
              # with "Forbidden host" — add the external hostname behind envoy.
              VIEWER_ALLOWED_HOSTS: agentmemory.${SECRET_DOMAIN}
              VIEWER_ALLOWED_ORIGINS: https://agentmemory.${SECRET_DOMAIN}
              # 0.9.27+ binds the viewer to 127.0.0.1 unless told otherwise;
              # non-loopback binds require AGENTMEMORY_SECRET +
              # VIEWER_ALLOWED_HOSTS (both set above).
              AGENTMEMORY_VIEWER_HOST: 0.0.0.0
              # One OpenAI-compatible provider serves BOTH embeddings and the
              # consolidation chat LLM (agentmemory can't split providers). The
              # agentgateway's no-auth internal listener routes root /v1/embeddings
              # to vllm-embed (Qwen3-VL-Embedding-2B on the B70) and
              # /v1/chat/completions to the local Qwen3.6-35B (llama.cpp SYCL) —
              # see agentgateway backends/vllm.yaml (HTTPRoute llm-local-root).
              # Base URL is the host ROOT (no /v1) — agentmemory appends
              # `/v1/embeddings` / `/v1/chat/completions` itself; a trailing /v1
              # yields /v1/v1/... -> 404.
              EMBEDDING_PROVIDER: openai
              OPENAI_BASE_URL: http://internal-noauth.ai.svc.cluster.local
              OPENAI_EMBEDDING_MODEL: qwen3-vl-embedding-2b
              OPENAI_EMBEDDING_DIMENSIONS: "2048"
              # No auth on the internal-noauth listener, but the openai client
              # still wants a key set.
              OPENAI_API_KEY: local
              # Use the same provider for the consolidation LLM.
              OPENAI_API_KEY_FOR_LLM: "true"
              OPENAI_MODEL: qwen3.6-35b-a3b
              # Consolidation turns raw observations into searchable/contextual
              # memory (required for recall). Graph extraction adds the entity/
              # relation knowledge graph (the graph leg of hybrid recall); both run
              # per-session — the local 35B on the B70 (~74 t/s) handles them.
              # AGENTMEMORY_AUTO_COMPRESS stays OFF (default synthetic compression):
              # it runs the LLM on EVERY observation — llama-server is single-slot,
              # so keep per-observation LLM load off it.
              CONSOLIDATION_ENABLED: "true"
              GRAPH_EXTRACTION_ENABLED: "true"
              # Generous LLM timeout: llama-server queues concurrent requests.
              AGENTMEMORY_LLM_TIMEOUT_MS: "120000"
              # Single-slot llama-server: the default 6 parallel summarize
              # calls would queue behind each other and risk iii's 180s
              # invocation budget — keep it at 2.
              SUMMARIZE_CHUNK_CONCURRENCY: "2"
              # Hourly consistent state snapshots inside the PVC (volsync then
              # backs up a clean restore point); also mitigates the 0.9.21
              # shutdown-flush bug (upstream #843, fixed in 0.9.27).
              SNAPSHOT_ENABLED: "true"
              SNAPSHOT_DIR: /data/snapshots
              # Periodic lesson synthesis on the local 35B — tokens are free.
              AGENTMEMORY_REFLECT: "true"
              # Homelab context stays relevant longer than the 30-day default.
              CONSOLIDATION_DECAY_DAYS: "60"
              TZ: ${CONFIG_TIMEZONE}
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /agentmemory/livez
                    port: &port 3111
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /agentmemory/livez
                    port: *port
                  failureThreshold: 60
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
    service:
      app:
        ports:
          api:
            port: *port
          streams:
            port: 3112
          viewer:
            port: 3113
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          # REST API (iii HTTP triggers, all under /agentmemory/*; bearer-auth
          # enforced via AGENTMEMORY_SECRET) — lets workstation agents share
          # this memory store.
          - matches:
              - path:
                  type: PathPrefix
                  value: /agentmemory
            backendRefs:
              - name: *app
                port: *port
          # Live event stream for the viewer. The iii 0.11.2 streams server
          # only accepts root-path WebSockets (join-message protocol) — the
          # viewer's direct /stream/mem-live/viewer URL 404s server-side and
          # it falls back to a root WS, so route BOTH: the /stream prefix
          # (future-proof) and any root request carrying an Upgrade: websocket
          # header. WebSocket auth headers aren't possible from browsers, so
          # the stream is unauthenticated — acceptable on the LAN-only
          # internal gateway; never expose on the public gateway.
          - matches:
              - path:
                  type: PathPrefix
                  value: /stream
            backendRefs:
              - name: *app
                port: 3112
          - matches:
              - path:
                  type: PathPrefix
                  value: /
                headers:
                  - name: Upgrade
                    value: websocket
            backendRefs:
              - name: *app
                port: 3112
          - backendRefs:
              - name: *app
                port: 3113
    persistence:
      # One PVC holds all state, mounted at both /data (the store) and /home/node
      # (the server's HOME, where it writes .agentmemory prefs).
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
          - path: /home/node
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
