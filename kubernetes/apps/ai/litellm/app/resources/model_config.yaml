router_model_list:
  - router_model_name: vision-router
    model_group: vision_tasks
    litellm_params:
      temperature: 0.5
    metadata:
      label: "Vision Assistant"
      capabilities: ["chat", "vision"]

  - router_model_name: code-router
    model_group: code_pipeline
    litellm_params:
      temperature: 0.2
    metadata:
      label: "Code Assistant"
      capabilities: ["chat", "code"]

  - router_model_name: education-router
    model_group: education_pipeline
    litellm_params:
      temperature: 0.6
    metadata:
      label: "Education Assistant"
      capabilities: ["chat", "reasoning", "tutoring"]

# All upstream traffic is routed through AgentGateway (internal-noauth listener).
# AgentGateway injects the real provider API key per backend; api_key here is a
# placeholder that satisfies the client-side requirement but is overwritten
# upstream.
