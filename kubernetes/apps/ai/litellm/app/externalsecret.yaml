---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name litellm-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        # LiteLLM
        LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}" # Must start with sk-
        LITELLM_SALT_KEY: "{{ .LITELLM_SALT_KEY }}" # Must start with sk-
        UI_USERNAME: "{{ .LITELLM_UI_USERNAME }}"
        UI_PASSWORD: "{{ .LITELLM_UI_PASSWORD }}"
        QDRANT_API_BASE: http://qdrant:6333
        QDRANT_API_KEY: "{{ .QDRANT_API_KEY }}"
        # Provider API keys intentionally removed — all upstream LLM traffic
        # flows through AgentGateway (http://internal-noauth.ai-system.svc.cluster.local),
        # which injects the real keys per backend from its own ExternalSecrets.
        # PostgreSQL Connection URL
        # postgres-17-rw pinned by per-manifest hardcode (explicit GitOps, not OnePassword).
        DATABASE_URL: "postgresql://{{ .POSTGRES_DB_USER_NAME }}:{{ .POSTGRES_DB_USER_PASSWORD }}@postgres-17-rw.database.svc.cluster.local:5432/{{ .POSTGRES_DB_NAME }}"

        # Postgres Init
        INIT_POSTGRES_DBNAME: "{{ .POSTGRES_DB_NAME }}"
        INIT_POSTGRES_HOST: "postgres-17-rw.database.svc.cluster.local"
        INIT_POSTGRES_USER: "{{ .POSTGRES_DB_USER_NAME }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_DB_USER_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: litellm
    - extract:
        key: qdrant
    - extract:
        key: cloudnative-pg
