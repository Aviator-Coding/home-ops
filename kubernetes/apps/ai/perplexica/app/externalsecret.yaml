---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name perplexica-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        config.toml: |
          [GENERAL]
          SIMILARITY_MEASURE = "cosine" # "cosine" or "dot"
          KEEP_ALIVE = "5m" # How long to keep Ollama models loaded into memory. (Instead of using -1 use "-1m")

          [MODELS.OPENAI]
          API_KEY = ""

          [MODELS.GROQ]
          API_KEY = ""

          [MODELS.ANTHROPIC]
          API_KEY = ""

          [MODELS.GEMINI]
          API_KEY = ""

          [MODELS.CUSTOM_OPENAI]
          # agentgateway internal-noauth injects the real provider key; the
          # client just needs a non-empty placeholder.
          API_KEY = "agentgateway-noauth"
          API_URL = "http://internal-noauth.ai-system.svc.cluster.local/openai"
          MODEL_NAME = ""

          [MODELS.OLLAMA]
          API_URL = "" # Ollama API URL - http://ollama.${SECRET_DOMAIN}:11434

          [MODELS.DEEPSEEK]
          API_KEY = "{{ .DEEPSEEK_API_KEY }}"

          [MODELS.AIMLAPI]
          API_KEY = "" # Required to use AI/ML API chat and embedding models

          [MODELS.LM_STUDIO]
          API_URL = "" # LM Studio API URL - http://host.docker.internal:1234

          [API_ENDPOINTS]
          SEARXNG = "http://searxng:8080" # SearxNG API URL - http://localhost:32768
  dataFrom:
    - extract:
        key: ai-keys
