---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      open-webui:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom:
              - secretRef:
                  name: *app
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.10.2@sha256:9fcea9c6e32ab60b0498f3986c6cdf651ddbe61db48d2213a3d28048ddd673d4
            env:
              ENABLE_CHANNELS: true
              # SQLAlchemy pool: defaults (5+10) saturate when large model
              # lists hammer postgres -> QueuePool TimeoutError, UI hangs
              DATABASE_POOL_SIZE: 20
              DATABASE_POOL_MAX_OVERFLOW: 30
              DATABASE_POOL_TIMEOUT: 30
              DATABASE_POOL_RECYCLE: 3600
              ENABLE_FORWARD_USER_INFO_HEADERS: true
              ENABLE_OLLAMA_API: false
              ENABLE_OPENAI_API: true
              # Single unified model-routing endpoint (keyless internal-noauth
              # gateway injects real provider keys). One connection now serves
              # every provider — the gateway routes by the request `model` field.
              # NOTE: OPENAI_API_BASE_URLS is a PersistentConfig var, so this env
              # value applies on a FRESH deploy; on the running instance update it
              # once via Settings -> Admin -> Connections (and add the model ids
              # you want in the picker, since /v1/models lists only the local
              # model — agentgateway does not aggregate model lists).
              OPENAI_API_BASE_URLS: http://internal-noauth.ai.svc.cluster.local/v1
              OPENAI_API_KEYS: nokey
              ENABLE_RAG_WEB_SEARCH: true
              ENABLE_SEARCH_QUERY: true
              # RAG_EMBEDDING_ENGINE: sentence-transformers
              # RAG_EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
              RAG_WEB_SEARCH_RESULT_COUNT: 3
              RAG_WEB_SEARCH_CONCURRENT_REQUESTS: 10
              RAG_WEB_SEARCH_ENGINE: searxng
              SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>
              ENABLE_WEBSOCKET_SUPPORT: "true"
              WEBSOCKET_MANAGER: "redis"
              WEBSOCKET_REDIS_URL: redis://open-webui-dragonfly:6379
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        # Upstream Open-WebUI image defaults to UID/GID 0 and writes to
        # /app/backend/open_webui/static at runtime — running as 1000 caused
        # [Errno 13] Permission denied errors on theming/static files.
        # fsGroup still chown's the PVC at /app/backend/data to gid 1000.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: open-webui
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://chat.${SECRET_DOMAIN}/health
            conditions:
              - "[STATUS] == 200"
            group: ai
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - chat.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/backend/data
