---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      open-webui:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom:
              - secretRef:
                  name: *app
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.6@sha256:90eae5b419e40b4c3dd684582b2c83440b36f9ae2f6532c09639b2ba4ee65158
            env:
              ENABLE_CHANNELS: true
              # SQLAlchemy pool: defaults (5+10) saturate when large model
              # lists hammer postgres -> QueuePool TimeoutError, UI hangs
              DATABASE_POOL_SIZE: 10
              DATABASE_POOL_MAX_OVERFLOW: 20
              DATABASE_POOL_TIMEOUT: 30
              DATABASE_POOL_RECYCLE: 3600
              ENABLE_FORWARD_USER_INFO_HEADERS: true
              ENABLE_OLLAMA_API: false
              ENABLE_OPENAI_API: true
              # internal-noauth gateway requires no auth — it injects real provider keys
              OPENAI_API_BASE_URLS: >-
                http://internal-noauth.ai.svc.cluster.local/vllm/v1;
                http://internal-noauth.ai.svc.cluster.local/openai/v1;
                http://internal-noauth.ai.svc.cluster.local/anthropic/v1;
                http://internal-noauth.ai.svc.cluster.local/groq/v1;
                http://internal-noauth.ai.svc.cluster.local/gemini/v1
              OPENAI_API_KEYS: "nokey;nokey;nokey;nokey;nokey"
              ENABLE_RAG_WEB_SEARCH: true
              ENABLE_SEARCH_QUERY: true
              # RAG_EMBEDDING_ENGINE: sentence-transformers
              # RAG_EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
              RAG_WEB_SEARCH_RESULT_COUNT: 3
              RAG_WEB_SEARCH_CONCURRENT_REQUESTS: 10
              RAG_WEB_SEARCH_ENGINE: searxng
              SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>
              ENABLE_WEBSOCKET_SUPPORT: "true"
              WEBSOCKET_MANAGER: "redis"
              WEBSOCKET_REDIS_URL: redis://open-webui-dragonfly:6379
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        # Upstream Open-WebUI image defaults to UID/GID 0 and writes to
        # /app/backend/open_webui/static at runtime — running as 1000 caused
        # [Errno 13] Permission denied errors on theming/static files.
        # fsGroup still chown's the PVC at /app/backend/data to gid 1000.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: open-webui
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            url: https://chat.${SECRET_DOMAIN}/health
            conditions:
              - "[STATUS] == 200"
            group: ai
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
          - chat.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      config:
        enabled: true
        existingClaim: *app
        globalMounts:
          - path: /app/backend/data
