---
# Persistent store for the memory MCP. The upstream MCPServer references an
# existing PVC named `memory-mcp` but ships no PVC manifest, so define one here.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memory-mcp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-block
  resources:
    requests:
      storage: 1Gi
