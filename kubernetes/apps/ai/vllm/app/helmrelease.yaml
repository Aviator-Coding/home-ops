---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      vllm:
        strategy: Recreate
        pod:
          terminationGracePeriodSeconds: 60
        containers:
          app:
            image: &image
              repository: docker.io/intel/llm-scaler-vllm
              tag: 0.14.0-b8.3.1
            command:
              - vllm
              - serve
              - palmfuture/Qwen3.6-35B-A3B-GPTQ-Int4
              - --served-model-name=qwen3.6-35b-a3b
              - --host=0.0.0.0
              - --port=8000
              - --dtype=float16
              - --gpu-memory-utilization=0.72
              - --max-model-len=32768
              # Intel fork maps GPTQ to its 'ipex' method, deprecated upstream
              - --allow-deprecated-quantization
            env: &env
              HF_HOME: /models
              VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
              VLLM_WORKER_MULTIPROC_METHOD: spawn
              ZES_ENABLE_SYSMAN: "1"
            resources:
              requests:
                cpu: "2"
                memory: 16Gi
                gpu.intel.com/xe: 1
              limits:
                memory: 48Gi
                gpu.intel.com/xe: 1
            probes:
              # First boot downloads ~20GB of weights + JIT compile; allow 30 min
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 60
              readiness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              liveness: *probe

      vllm-embed:
        strategy: Recreate
        containers:
          app:
            image: *image
            command:
              - vllm
              - serve
              - Qwen/Qwen3-VL-Embedding-2B
              # --task was removed in vLLM 0.14; needs both runner + convert here
              # (convert alone leaves pooler_config unset -> AssertionError)
              - --runner=pooling
              - --convert=embed
              - --served-model-name=qwen3-vl-embedding-2b
              - --host=0.0.0.0
              - --port=8000
              - --dtype=float16
              # 0.15 (4.8GB) only covers the fp16 weights; no room for cache blocks
              - --gpu-memory-utilization=0.20
              - --max-model-len=8192
            env: *env
            resources:
              requests:
                cpu: "1"
                memory: 4Gi
                gpu.intel.com/xe: 1
              limits:
                memory: 16Gi
                gpu.intel.com/xe: 1
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 20
              readiness: *probe
              liveness: *probe

    service:
      app:
        controller: vllm
        ports:
          http:
            port: 8000
      embed:
        controller: vllm-embed
        ports:
          http:
            port: 8000

    persistence:
      models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 50Gi
        advancedMounts:
          vllm:
            app:
              - path: /models
      embed-models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 20Gi
        advancedMounts:
          vllm-embed:
            app:
              - path: /models
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 16Gi
        advancedMounts:
          vllm:
            app:
              - path: /dev/shm
