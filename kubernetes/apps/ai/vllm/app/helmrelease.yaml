---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      # Main chat model runs on llama.cpp SYCL, not vLLM: Qwen3.6-35B-A3B GPTQ
      # cannot complete vLLM warmup on a single 32GB B70 (21.4GiB weights +
      # IPEX MoE marlin-shuffle transients OOM the card even with nothing else
      # resident) — open bug intel/llm-scaler#382. Controller keeps the vllm
      # name so the service (vllm-app) and gateway backend stay stable.
      vllm:
        strategy: Recreate
        pod:
          terminationGracePeriodSeconds: 60
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-intel-b9592
            args:
              - -hf
              - unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_M
              - --alias
              - qwen3.6-35b-a3b
              - --host
              - "0.0.0.0"
              - --port
              - "8000"
              - --ctx-size
              # Native window is 262144 (no yarn). Hybrid arch (10/40 full-attn
              # layers, 2 KV heads) → ~20 KiB/token → ~2.6 GiB KV @128k. Single
              # request gets the whole pool (kv_unified=true). Shares 32G B70 with
              # vllm-embed + comfyui — step down to 98304/65536 on VRAM OOM.
              - "131072"
              - -ngl
              - "99"
              - --jinja
              - --metrics
            env:
              LLAMA_CACHE: /models/llama
              ONEAPI_DEVICE_SELECTOR: level_zero:0
              ZES_ENABLE_SYSMAN: "1"
            envFrom: &envFrom
              - secretRef:
                  name: vllm-secret
            resources:
              requests:
                cpu: "2"
                memory: 16Gi
                gpu.intel.com/xe: 1
              limits:
                memory: 48Gi
                gpu.intel.com/xe: 1
            probes:
              # First boot downloads ~21GB GGUF; allow 30 min
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 60
              readiness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              liveness: *probe

      vllm-embed:
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/intel/llm-scaler-vllm
              tag: 0.14.0-b8.3.1
            command:
              - vllm
              - serve
              - Qwen/Qwen3-VL-Embedding-2B
              # --task was removed in vLLM 0.14; needs both runner + convert here
              # (convert alone leaves pooler_config unset -> AssertionError)
              - --runner=pooling
              - --convert=embed
              - --served-model-name=qwen3-vl-embedding-2b
              - --host=0.0.0.0
              - --port=8000
              - --dtype=float16
              # 0.15 (4.8GB) only covers the fp16 weights; no room for cache blocks
              - --gpu-memory-utilization=0.20
              - --max-model-len=8192
            env:
              HF_HOME: /models
              VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
              VLLM_WORKER_MULTIPROC_METHOD: spawn
              ZES_ENABLE_SYSMAN: "1"
            envFrom: *envFrom
            resources:
              requests:
                cpu: "1"
                memory: 4Gi
                gpu.intel.com/xe: 1
              limits:
                memory: 16Gi
                gpu.intel.com/xe: 1
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 20
              readiness: *probe
              liveness: *probe

    service:
      app:
        controller: vllm
        ports:
          http:
            port: 8000
      embed:
        controller: vllm-embed
        ports:
          http:
            port: 8000

    persistence:
      models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 50Gi
        advancedMounts:
          vllm:
            app:
              - path: /models
      embed-models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: ceph-block
        size: 20Gi
        advancedMounts:
          vllm-embed:
            app:
              - path: /models
