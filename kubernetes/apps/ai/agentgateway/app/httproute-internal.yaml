---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-internal
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/name: AgentGateway
    gethomepage.dev/description: "AI Agent Gateway - LLM Model Router"
    gethomepage.dev/icon: agentgateway.png
    external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
    gatus.home-operations.com/endpoint: |-
      conditions: ["[STATUS] == 200"]
      url: "https://llm.${SECRET_DOMAIN}/ui/"
spec:
  hostnames:
    - "llm.${SECRET_DOMAIN}"
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    # agentgateway v1.3.0 serves the dashboard at /ui (the backend 308-redirects
    # bare / to an http:// URL, which dead-ends behind the TLS gateway). Issue a
    # clean same-scheme redirect to /ui/ at the gateway so the hostname works.
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /ui/
            statusCode: 302
    - backendRefs:
        - name: agentgateway-admin-ui
          namespace: ai
          port: 15000
