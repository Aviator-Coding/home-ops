---
# Local vLLM on the Arc Pro B70 (talos-3) — llm-scaler, OpenAI-compatible.
# In-cluster service: no TLS, no auth secret.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: vllm
spec:
  ai:
    provider:
      openai: {}
      host: vllm-app.ai.svc.cluster.local
      port: 8000

  policies:
    ai:
      routes:
        "/v1/chat/completions": Completions
        "/v1/embeddings": Passthrough
        "/v1/models": Passthrough
        "*": Passthrough
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: vllm-embed
spec:
  ai:
    provider:
      openai: {}
      host: vllm-embed.ai.svc.cluster.local
      port: 8000

  policies:
    ai:
      routes:
        "/v1/embeddings": Passthrough
        "/v1/models": Passthrough
        "*": Passthrough
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vllm
spec:
  parentRefs:
    - name: internal
    - name: internal-noauth
    - name: public
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /vllm-embed
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vllm-embed
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - path:
            type: PathPrefix
            value: /vllm
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vllm
          group: agentgateway.dev
          kind: AgentgatewayBackend
