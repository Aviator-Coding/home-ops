---
# Local vLLM on the Arc Pro B70 (talos-3) — llm-scaler, OpenAI-compatible.
# In-cluster service: no TLS, no auth secret.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: vllm
spec:
  ai:
    provider:
      openai: {}
      host: vllm-app.ai.svc.cluster.local
      port: 8000

  policies:
    ai:
      routes:
        "/v1/chat/completions": Completions
        "/v1/embeddings": Passthrough
        "/v1/models": Passthrough
        "*": Passthrough
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: vllm-embed
spec:
  ai:
    provider:
      openai: {}
      host: vllm-embed.ai.svc.cluster.local
      port: 8000

  policies:
    ai:
      routes:
        "/v1/embeddings": Passthrough
        "/v1/models": Passthrough
        "*": Passthrough
---
# Local-first chat with subscription failover: group 1 = llama.cpp 35B on the
# B70, group 2 = OpenCode Go (kimi-k2.6, flat subscription; reuses
# opencodego-secret from backends/opencodego.yaml). Used ONLY by the
# llm-local-root chat rule (agentmemory) — the /vllm and /opencodego routes
# stay pure so Hermes' own fallback chain doesn't double-fall-back.
# Embeddings are deliberately excluded: a fallback embedder at different
# dimensions would corrupt agentmemory's vector index.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: llm-chat-failover
spec:
  ai:
    groups:
      - providers:
          - name: local-qwen
            openai:
              model: qwen3.6-35b-a3b
            host: vllm-app.ai.svc.cluster.local
            port: 8000
      - providers:
          - name: opencodego-kimi
            openai:
              model: kimi-k2.6
            host: opencode.ai
            port: 443
            # pathPrefix REPLACES the default /v1 base path — it must include
            # the /v1 suffix or requests land on /zen/go/chat/completions and
            # get the opencode.ai website back.
            pathPrefix: /zen/go/v1
            policies:
              tls: {}
              auth:
                secretRef:
                  name: opencodego-secret
---
# REQUIRED for failover: without a health policy targeting the backend,
# providers are never evicted and group 2 is never tried (verified live).
# Connection failures count toward eviction too; a 429 Retry-After header
# overrides the eviction duration.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: llm-chat-failover-health
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: llm-chat-failover
  backend:
    health:
      unhealthyCondition: "response.code >= 500 || response.code == 429"
      eviction:
        duration: 60s
        consecutiveFailures: 2
---
# Root-path /v1/* routes on the no-auth internal gateway: lets single-provider
# OpenAI clients (agentmemory) use one base URL for both chat (llama.cpp 35B
# with kimi failover) and embeddings (vllm-embed, no failover). Deliberately
# NOT on the public gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-local-root
spec:
  parentRefs:
    - name: internal-noauth
  rules:
    - matches:
        - path:
            type: Exact
            value: /v1/embeddings
      backendRefs:
        - name: vllm-embed
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - path:
            type: Exact
            value: /v1/chat/completions
        - path:
            type: Exact
            value: /v1/models
      backendRefs:
        - name: llm-chat-failover
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vllm
spec:
  parentRefs:
    - name: internal
    - name: internal-noauth
    - name: public
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /vllm-embed
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vllm-embed
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - path:
            type: PathPrefix
            value: /vllm
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: vllm
          group: agentgateway.dev
          kind: AgentgatewayBackend
