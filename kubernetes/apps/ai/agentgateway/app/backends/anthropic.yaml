---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: anthropic-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: anthropic-secret
    template:
      data:
        Authorization: "{{ .ANTHROPIC_API_KEY }}"
  dataFrom:
    - extract:
        key: ai-keys
---
# Single passthrough backend (no model pinned → the client's request-body
# `model` is forwarded). `Completions` on the /v1/chat/completions suffix makes
# agentgateway translate OpenAI Chat Completions → Anthropic Messages, so
# OpenAI-compatible clients (open-webui, the unified /v1 endpoint) work; the
# native /v1/messages suffix is kept for any native-Anthropic client.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic
spec:
  ai:
    provider:
      anthropic: {}
  policies:
    ai:
      routes:
        "/v1/chat/completions": Completions
        "/v1/messages": Messages
        "/v1/models": Passthrough
        "*": Passthrough
    auth:
      secretRef:
        name: anthropic-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: anthropic
spec:
  parentRefs:
    - name: internal
    - name: internal-noauth
    - name: public
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /anthropic
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: anthropic
          group: agentgateway.dev
          kind: AgentgatewayBackend
