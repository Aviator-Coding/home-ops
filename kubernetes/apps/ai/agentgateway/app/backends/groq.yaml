---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: groq-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: groq-secret
    template:
      data:
        Authorization: "{{ .GROQ_API_KEY }}"
  dataFrom:
    - extract:
        key: ai-keys
---
# Groq AgentgatewayBackend (OpenAI-compatible). Reached via the unified /v1
# endpoint (../httproute-unified.yaml) by model name (llama*/mixtral*/gemma*/...);
# the unified groq rule prepends /openai (Groq serves at api.groq.com/openai/v1).
# The explicit /groq path route was retired.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: groq
spec:
  ai:
    provider:
      openai: {}
      host: api.groq.com
      port: 443
  policies:
    tls: {}
    auth:
      secretRef:
        name: groq-secret
    ai:
      routes:
        "/v1/chat/completions": Completions
        "/v1/embeddings": Passthrough
        "/v1/models": Passthrough
        "*": Passthrough
