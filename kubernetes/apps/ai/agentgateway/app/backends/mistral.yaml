---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mistral-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mistral-secret
    template:
      data:
        Authorization: "{{ .MISTRAL_API_KEY }}"
  dataFrom:
    - extract:
        key: ai-keys
---
# mistral AgentgatewayBackend (OpenAI-compatible). Reached via the unified /v1
# endpoint (../httproute-unified.yaml) by model name (mistral-*/magistral/
# ministral/codestral/pixtral/devstral/open-mi*). The explicit /mistral path
# route was retired.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mistral
spec:
  ai:
    provider:
      openai: {}
      host: api.mistral.ai
      port: 443
  policies:
    tls: {}
    auth:
      secretRef:
        name: mistral-secret
    ai:
      routes:
        "/v1/chat/completions": Completions
        "/v1/embeddings": Passthrough
        "/v1/models": Passthrough
        "*": Passthrough
