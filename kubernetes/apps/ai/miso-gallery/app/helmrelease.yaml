---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app miso-gallery
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      miso-gallery:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/misospace/miso-gallery
              tag: 0.1.16
            env:
              DATA_FOLDER: /data
              IMAGE_BASE_URL: "https://miso-gallery.${SECRET_DOMAIN}"
              AUTH_TYPE: local
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 5000
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      # The shared comfyui-output PVC is RWO ceph-block, so this pod must run on
      # the same node as ComfyUI (talos-3, where ComfyUI's GPU pins it).
      nodeSelector:
        kubernetes.io/hostname: talos-3
      securityContext:
        # Non-root; fsGroup lets it read the shared output volume.
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: LLM/Ai
          gethomepage.dev/name: Miso Gallery
          gethomepage.dev/description: Web gallery for ComfyUI outputs
          gatus.home-operations.com/endpoint: |-
            url: https://miso-gallery.${SECRET_DOMAIN}/
            conditions:
              - "[STATUS] == 200"
            group: ai
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      # Shared ComfyUI output, read-only (gallery only reads).
      data:
        existingClaim: comfyui-output
        globalMounts:
          - path: /data
            readOnly: true
