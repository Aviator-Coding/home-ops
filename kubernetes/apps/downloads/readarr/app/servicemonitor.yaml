---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: &app readarr
  namespace: downloads
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: *app
  namespaceSelector:
    matchNames:
      - downloads
  endpoints:
    - port: metrics
      path: /metrics
      interval: 1m
      scrapeTimeout: 30s
