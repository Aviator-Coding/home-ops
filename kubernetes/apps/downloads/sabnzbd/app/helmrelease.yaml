---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sabnzbd
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      sabnzbd:
        annotations:
          reloader.stakater.com/auto: "true"

        # Single replica with RWO PVCs (config + incomplete). Recreate avoids a
        # RollingUpdate Multi-Attach deadlock where the new pod can't attach the
        # RWO volume while the old pod still holds it.
        strategy: Recreate

        pod:
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            runAsNonRoot: true
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch

        initContainers:
          init-dirs:
            image:
              repository: alpine
              tag: latest
            command:
              - sh
              - -c
              - |
                mkdir -p /data/downloads/usenet/complete/movies
                mkdir -p /data/downloads/usenet/complete/tv
                mkdir -p /data/downloads/usenet/complete/music
                mkdir -p /data/downloads/usenet/complete/books
                mkdir -p /data/downloads/usenet/complete/audiobooks
                mkdir -p /data/downloads/usenet/complete/comics
                mkdir -p /data/downloads/usenet/complete/magazines
                mkdir -p /data/downloads/usenet/complete/other
                mkdir -p /data/downloads/usenet/incomplete
                echo "Created directories successfully"
            securityContext:
              runAsUser: 2000
              runAsGroup: 2000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

        containers:
          app:
            image:
              repository: ghcr.io/home-operations/sabnzbd
              tag: 5.0.4
            env:
              SABNZBD__PORT: &port 8080
              SABNZBD__HOST_WHITELIST_ENTRIES: >-
                sabnzbd,
                sabnzbd.downloads,
                sabnzbd.downloads.svc,
                sabnzbd.downloads.svc.cluster,
                sabnzbd.downloads.svc.cluster.local,
                sabnzbd.${SECRET_DOMAIN}
              XSEED_HOST: cross-seed.downloads.svc.cluster.local
              XSEED_PORT: 2468
            envFrom:
              - secretRef:
                  name: sabnzbd-secret
            probes:
              # SABnzbd's web API blocks during heavy post-processing (par2
              # verify/repair, unrar/7zip). A 1s timeout tripped the liveness
              # probe and killed a busy-but-healthy process, dropping it from
              # the Service endpoints (gateway 503s). Probes are relaxed so only
              # a genuinely dead process is restarted.
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 15
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api?mode=version
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 500m # Increased from 5m to 500m
                memory: 2048Mi
              limits:
                cpu: 4000m # Raised 2000m->4000m so par2/7zip aren't throttled (slow API trips probes)
                # 10Gi: post-processing 60-80GB UHD remuxes (par2 + unrar)
                # was OOMKilling at 6Gi.
                memory: 10240Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    defaultPodOptions:
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sabnzbd

    service:
      app:
        controller: sabnzbd
        ports:
          http:
            port: *port

    persistence:
      config:
        existingClaim: sabnzbd-config
        advancedMounts:
          sabnzbd:
            app:
              - path: /config

      downloads:
        existingClaim: shared-downloads
        advancedMounts:
          sabnzbd:
            init-dirs:
              - path: /data/downloads
            app:
              - path: /data/downloads

      # Article-assembly scratch (download_dir) on ceph-block (RWO, block) instead
      # of CephFS RWX, to keep the thousands of tiny SABnzbd_article_* files off the
      # MDS metadata journal (2026-06-14 storm stalled the whole filesystem). Mounts
      # over the usenet/incomplete subpath of the shared-downloads CephFS mount;
      # `complete` stays on shared-downloads (CephFS RWX) for *arr hardlinks. Path
      # matches download_dir in sabnzbd.ini so no SABnzbd setting change is needed.
      incomplete:
        existingClaim: sabnzbd-incomplete
        advancedMounts:
          sabnzbd:
            init-dirs:
              - path: /data/downloads/usenet/incomplete
            app:
              - path: /data/downloads/usenet/incomplete

      temp:
        type: emptyDir
        advancedMounts:
          sabnzbd:
            app:
              - path: /tmp
      scripts:
        type: configMap
        name: sabnzbd-scripts
        defaultMode: 0775
        advancedMounts:
          sabnzbd:
            app:
              - path: /config/scripts

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: *app
          gethomepage.dev/icon: https://raw.githubusercontent.com/loganmarchione/homelab-svg-assets/refs/heads/main/assets/sabnzbd.svg
          # gethomepage.dev/siteMonitor: coder.${SECRET_DOMAIN}
          gethomepage.dev/description: "SABnzbd is an open source binary newsreader written in Python. It simplifies the process of downloading from Usenet."
          gethomepage.dev/pod-selector: app.kubernetes.io/name=sabnzbd
        hostnames:
          - sabnzbd.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: sabnzbd
                port: *port
