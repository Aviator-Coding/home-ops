---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seerr
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: seerr-secret
    creationPolicy: Owner
    template:
      data:
        # Postgres Init
        # Cutover 2026-04-26: pinned to postgres-17-v4 (recovered from v3 Barman). See plan: soft-tickling-storm.md.
        INIT_POSTGRES_DBNAME: &dbName "{{ .POSTGRES_DB_NAME }}"
        INIT_POSTGRES_HOST: &dbHost "postgres-17-v4-rw.database.svc.cluster.local"
        INIT_POSTGRES_USER: &dbUser "{{ .POSTGRES_DB_USER_NAME }}"
        INIT_POSTGRES_PASS: &dbPass "{{ .POSTGRES_DB_USER_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"

        # Seerr DB connection
        DB_TYPE: postgres
        DB_HOST: *dbHost
        DB_PORT: "5432"
        DB_USER: *dbUser
        DB_PASS: *dbPass
        DB_NAME: *dbName

  dataFrom:
    - extract:
        key: seerr
    - extract:
        key: cloudnative-pg
