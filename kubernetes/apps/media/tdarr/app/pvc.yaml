---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tdarr-temp
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  # Migrated off the broken default `csi` subvolumegroup onto `csi-rwx` after the
  # Ceph Tentacle v20.2.1 subvolume corruption. Disposable transcode scratch, so
  # recreated empty (no data copy). Revert to `ceph-filesystem` once a fixed Ceph
  # release repairs the default `csi` group.
  storageClassName: ceph-filesystem-rwx
