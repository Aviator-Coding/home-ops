---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tdarr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      tdarr:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups:
              - 44   # video group for GPU access
              - 109  # render group for GPU access

        containers:
          app:
            image:
              repository: ghcr.io/haveagitgat/tdarr
              tag: 2.68.01
            env:
              TZ: America/New_York
              PUID: "2000"
              PGID: "2000"
              UMASK_SET: "002"
              serverIP: 0.0.0.0
              serverPort: &serverPort 8266
              webUIPort: &webPort 8265
              internalNode: "true"
              inContainer: "true"
              ffmpegVersion: "7"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/status
                    port: *webPort
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                gpu.intel.com/i915: 1
                memory: 8Gi

    service:
      app:
        controller: tdarr
        ports:
          http:
            port: *webPort
          server:
            port: *serverPort

    persistence:
      config:
        existingClaim: tdarr-config
        globalMounts:
          - path: /app/server
      configs:
        type: emptyDir
        globalMounts:
          - path: /app/configs
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
      temp:
        type: emptyDir
        sizeLimit: 100Gi
        globalMounts:
          - path: /temp
      media:
        type: nfs
        server: nas.${SECRET_DOMAIN}
        path: /mnt/storage/Media
        globalMounts:
          - path: /media

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: *app
          gethomepage.dev/icon: https://raw.githubusercontent.com/loganmarchione/homelab-svg-assets/refs/heads/main/assets/tdarr.svg
          gethomepage.dev/description: "Tdarr is a distributed transcoding system for automating media library optimization."
          gethomepage.dev/pod-selector: app.kubernetes.io/name=tdarr
        hostnames:
          - tdarr.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: tdarr
                port: *webPort
