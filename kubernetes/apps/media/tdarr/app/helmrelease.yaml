---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tdarr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 2000
        runAsNonRoot: false
        seccompProfile: { type: RuntimeDefault }

    controllers:
      # Server: Web UI + orchestrator. No GPU - just coordinates workers.
      tdarr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/haveagitgat/tdarr
              tag: 2.68.01
            env:
              - name: TZ
                value: America/New_York
              - name: PUID
                value: "2000"
              - name: PGID
                value: "2000"
              - name: UMASK_SET
                value: "002"
              - name: serverIP
                value: 0.0.0.0
              - name: serverPort
                value: "8266"
              - name: webUIPort
                value: "8265"
              - name: internalNode
                value: "false"
              - name: inContainer
                value: "true"
              - name: ffmpegVersion
                value: "7"
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
                  - SETUID
                  - SETGID
                  - FOWNER
                  - DAC_OVERRIDE
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/status
                    port: 8265
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

      # Worker DaemonSet: one pod per K8s node, each with a GPU.
      tdarr-node:
        type: daemonset
        containers:
          app:
            image:
              repository: ghcr.io/haveagitgat/tdarr_node
              tag: 2.70.01
            env:
              - name: TZ
                value: America/New_York
              - name: PUID
                value: "2000"
              - name: PGID
                value: "2000"
              - name: UMASK_SET
                value: "002"
              - name: nodeName
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              - name: serverIP
                value: tdarr.media.svc.cluster.local
              - name: serverPort
                value: "8266"
              - name: inContainer
                value: "true"
              - name: nodeType
                value: mapped
              - name: ffmpegVersion
                value: "7"
              - name: transcodegpuWorkers
                value: "1"
              - name: transcodecpuWorkers
                value: "0"
              - name: healthcheckgpuWorkers
                value: "1"
              - name: healthcheckcpuWorkers
                value: "1"
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
                add:
                  - CHOWN
                  - SETUID
                  - SETGID
                  - FOWNER
                  - DAC_OVERRIDE
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                gpu.intel.com/i915: 1
                memory: 4Gi

    service:
      app:
        controller: tdarr
        ports:
          http:
            port: 8265
          server:
            port: 8266

    persistence:
      config:
        existingClaim: tdarr-config
        advancedMounts:
          tdarr:
            app:
              - path: /app/server
      configs:
        type: emptyDir
        globalMounts:
          - path: /app/configs
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
      temp:
        existingClaim: tdarr-temp
        globalMounts:
          - path: /temp
      media:
        type: nfs
        server: nas.${SECRET_DOMAIN}
        path: /mnt/storage/Media
        globalMounts:
          - path: /media

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: *app
          gethomepage.dev/icon: https://raw.githubusercontent.com/loganmarchione/homelab-svg-assets/refs/heads/main/assets/tdarr.svg
          gethomepage.dev/description: "Tdarr is a distributed transcoding system for automating media library optimization."
          gethomepage.dev/pod-selector: app.kubernetes.io/name=tdarr
        hostnames:
          - tdarr.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: tdarr
                port: 8265
