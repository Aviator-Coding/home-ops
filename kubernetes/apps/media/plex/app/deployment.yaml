---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex-exporter
  namespace: media
  labels:
    app.kubernetes.io/name: plex-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plex-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plex-exporter
    spec:
      containers:
        - name: exporter
          image: ghcr.io/axsuul/plex-media-server-exporter:2.1.0
          env:
            - name: PORT
              value: "9594"
            - name: PLEX_ADDR
              value: http://plex.media.svc.cluster.local:32400
            - name: PLEX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: plex-exporter-secret
                  key: PLEX_TOKEN
          ports:
            - name: metrics
              containerPort: 9594
          startupProbe:
            httpGet:
              path: /
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
