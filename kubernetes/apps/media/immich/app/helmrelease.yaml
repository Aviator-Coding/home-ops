---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich
spec:
  interval: 30m
  # Keep this above the default because image and migration work can exceed 5m.
  # Bumped from 15m to 25m to absorb cold-start jitter when telemetry is enabled.
  timeout: 25m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      server:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3
            envFrom: &envFrom
              - secretRef:
                  name: immich-secret
          init-db-extensions:
            image:
              # renovate: datasource=docker depName=ghcr.io/home-operations/postgres-init
              repository: ghcr.io/home-operations/postgres-init
              tag: "17.6"
            envFrom: *envFrom
            command:
              - /bin/sh
              - -c
              - |
                export PGPASSWORD="$${INIT_POSTGRES_SUPER_PASS}"
                psql -h "$${DB_HOSTNAME}" -U postgres -d "$${DB_DATABASE_NAME}" -c 'CREATE EXTENSION IF NOT EXISTS "vector";'
                psql -h "$${DB_HOSTNAME}" -U postgres -d "$${DB_DATABASE_NAME}" -c 'CREATE EXTENSION IF NOT EXISTS "cube";'
                psql -h "$${DB_HOSTNAME}" -U postgres -d "$${DB_DATABASE_NAME}" -c 'CREATE EXTENSION IF NOT EXISTS "earthdistance";'

        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5
            env:
              IMMICH_PORT: &serverPort 2283
              DB_VECTOR_EXTENSION: pgvector
              REDIS_HOSTNAME: immich-dragonfly.media.svc.cluster.local
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning.media.svc.cluster.local:3003
              IMMICH_TELEMETRY_INCLUDE: api
            envFrom: *envFrom
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 2Gi
            probes:
              liveness: &serverProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: *serverPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 5
              readiness: *serverProbes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10

      machine-learning:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/immich-app/immich-machine-learning
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5
            env:
              IMMICH_PORT: &mlPort 3003
              MACHINE_LEARNING_CACHE_FOLDER: /cache
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                memory: 4Gi
            probes:
              liveness: &mlProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *mlPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 5
              readiness: *mlProbes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      server:
        controller: server
        ports:
          http:
            port: *serverPort
          metrics:
            port: 8081
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: *mlPort

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: Immich
          gethomepage.dev/icon: immich.svg
          gethomepage.dev/description: Self-hosted photo and video management
          gethomepage.dev/pod-selector: app.kubernetes.io/name=immich
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
          gatus.home-operations.com/endpoint: |-
            url: https://photos.${SECRET_DOMAIN}/api/server/ping
            conditions:
              - "[STATUS] == 200"
            group: media
        hostnames:
          - "photos.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: immich-server
                namespace: media
                port: *serverPort

    persistence:
      library:
        existingClaim: ${VOLSYNC_CLAIM:-immich-library}
        advancedMounts:
          server:
            app:
              - path: /usr/src/app/upload
      # Immich writes schema migration diffs to /usr/src/app/dist/schema at startup.
      # The dist/ dir is root-owned in the image; mount a writable emptyDir over the schema subdir.
      schema-tmp:
        type: emptyDir
        advancedMounts:
          server:
            app:
              - path: /usr/src/app/dist/schema
      model-cache:
        type: emptyDir
        advancedMounts:
          machine-learning:
            app:
              - path: /cache
