---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name immich-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Immich database connection
        # postgres-17-rw pinned by per-manifest hardcode (explicit GitOps, not OnePassword).
        DB_HOSTNAME: &dbhost "postgres-17-rw.database.svc.cluster.local"
        DB_DATABASE_NAME: &dbname "{{ .POSTGRES_DB_NAME }}"
        DB_USERNAME: &dbuser "{{ .POSTGRES_DB_USER_NAME }}"
        DB_PASSWORD: &dbpass "{{ .POSTGRES_DB_USER_PASSWORD }}"

        # Immich secret key
        IMMICH_SECRET_KEY: "{{ .IMMICH_SECRET_KEY }}"

        # Postgres Init
        INIT_POSTGRES_DBNAME: *dbname
        INIT_POSTGRES_HOST: *dbhost
        INIT_POSTGRES_USER: *dbuser
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: immich
    - extract:
        key: cloudnative-pg
