---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless-ngx
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      paperless-ngx:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3
            envFrom: &envFrom
              - secretRef:
                  name: paperless-ngx-secret

        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.13
            env:
              # General
              PAPERLESS_URL: "https://docs.${SECRET_DOMAIN}"
              PAPERLESS_PORT: &port 8000
              PAPERLESS_TIME_ZONE: Pacific/Auckland
              # Redis (via Dragonfly)
              PAPERLESS_REDIS: "redis://paperless-ngx-dragonfly.selfhosted.svc.cluster.local:6379"
              # OCR
              PAPERLESS_OCR_LANGUAGE: eng
              # Consumer (polling required on Ceph -- no inotify support)
              PAPERLESS_CONSUMER_POLLING: "60"
              PAPERLESS_CONSUMER_RECURSIVE: "true"
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
              # Workers
              PAPERLESS_TASK_WORKERS: "2"
              PAPERLESS_WEBSERVER_WORKERS: "2"
            envFrom: *envFrom
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 2Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      app:
        controller: paperless-ngx
        ports:
          http:
            port: *port

    persistence:
      data:
        enabled: true
        existingClaim: ${VOLSYNC_CLAIM:-*app}
        globalMounts:
          - path: /usr/src/paperless/data
      media:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 50Gi
        storageClass: ceph-block
        globalMounts:
          - path: /usr/src/paperless/media
      consume:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: ceph-block
        globalMounts:
          - path: /usr/src/paperless/consume

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Selfhosted
          gethomepage.dev/name: Paperless-ngx
          gethomepage.dev/icon: paperless-ngx.svg
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
          gatus.home-operations.com/endpoint: |-
            url: https://docs.${SECRET_DOMAIN}/
            conditions:
              - "[STATUS] == 200"
            group: selfhosted
        hostnames:
          - "docs.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: paperless-ngx
                namespace: selfhosted
                port: *port
