---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name linkwarden-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        NEXTAUTH_SECRET: "{{ .NEXTAUTH_SECRET }}"
        OPENAI_API_KEY: "{{ .OPENROUTER_API_KEY }}"

        # Rename 2026-04-26: postgres-17-rw (pinned via per-manifest hardcode for explicit GitOps control). See plan: soft-tickling-storm.md.
        DATABASE_URL: "postgresql://{{ .POSTGRES_DB_USER_NAME }}:{{ .POSTGRES_DB_USER_PASSWORD }}@postgres-17-rw.database.svc.cluster.local:5432/{{ .POSTGRES_DB_NAME }}"

        # Postgres Init
        INIT_POSTGRES_DBNAME: &dbname "{{ .POSTGRES_DB_NAME }}"
        INIT_POSTGRES_HOST: &dbhost "postgres-17-rw.database.svc.cluster.local"
        INIT_POSTGRES_USER: &dbuser "{{ .POSTGRES_DB_USER_NAME }}"
        INIT_POSTGRES_PASS: &dbpass "{{ .POSTGRES_DB_USER_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: linkwarden
    - extract:
        key: cloudnative-pg
    - extract:
        key: ai-keys
