---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app linkwarden
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      linkwarden:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3
            envFrom: &envFrom
              - secretRef:
                  name: linkwarden-secret
          init-playwright:
            image:
              repository: ghcr.io/linkwarden/linkwarden
              tag: v2.14.0
            command:
              - /bin/sh
              - -c
              - npx playwright install chromium

        containers:
          app:
            image:
              repository: ghcr.io/linkwarden/linkwarden
              tag: v2.14.0
            env:
              NEXT_SHARP_PATH: /data/node_modules/sharp
              NEXTAUTH_URL: "https://links.${SECRET_DOMAIN}"
              NEXT_PUBLIC_DISABLE_REGISTRATION: "true"
              NEXT_PUBLIC_CREDENTIALS_ENABLED: "true"
              # AI tagging via AgentGateway -> OpenRouter
              CUSTOM_OPENAI_BASE_URL: "http://internal-noauth.ai-system.svc.cluster.local/openrouter/v1"
              OPENAI_MODEL: "google/gemini-2.0-flash-lite-001"
            envFrom: *envFrom
            ports:
              - name: http
                containerPort: &port 3000
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 1536Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      app:
        controller: linkwarden
        ports:
          http:
            port: *port

    persistence:
      data:
        enabled: true
        existingClaim: ${VOLSYNC_CLAIM:-*app}
        globalMounts:
          - path: /data/data
      cache:
        type: emptyDir
        globalMounts:
          - path: /home/node/.cache
      next-cache:
        type: emptyDir
        globalMounts:
          - path: /data/apps/web/.next/cache

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Selfhosted
          gethomepage.dev/name: Linkwarden
          gethomepage.dev/icon: linkwarden.svg
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
        hostnames:
          - "links.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: linkwarden
                namespace: selfhosted
                port: *port
