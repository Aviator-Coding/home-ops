---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app linkwarden
  namespace: &namespace selfhosted
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  interval: 30m
  timeout: 5m
  path: "./kubernetes/apps/selfhosted/linkwarden/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  dependsOn:
    - name: onepassword-store
      namespace: security
    - name: volsync
      namespace: system
    - name: cloudnative-pg
      namespace: database
  components:
    - ../../../../components/volsync
    - ../../../../components/gatus/guarded
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: *app
      APP_UID: "1000"
      APP_GID: "1000"
      VOLSYNC_CLAIM: linkwarden
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_SCHEDULE_CEPH: "10 */4 * * *"
      VOLSYNC_SCHEDULE_MINIO: "45 */6 * * *"
      VOLSYNC_SCHEDULE_R2: "15 4 * * *"
