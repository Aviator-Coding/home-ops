---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app obsidian-livesync
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      obsidian-livesync:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: docker.io/library/couchdb
              tag: "3.4"
            env:
              TZ: America/New_York
              COUCHDB_ERLANG_FLAGS: -setcookie monster
            envFrom:
              - secretRef:
                  name: obsidian-livesync-secret
            resources:
              requests:
                cpu: 250m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 5984
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsUser: 5984
        runAsGroup: 5984
        fsGroup: 5984
        fsGroupChangePolicy: "OnRootMismatch"

    service:
      app:
        controller: obsidian-livesync
        ports:
          http:
            port: *port

    persistence:
      data:
        enabled: true
        existingClaim: ${VOLSYNC_CLAIM:-*app}
        globalMounts:
          - path: /opt/couchdb/data
      config:
        type: configMap
        name: obsidian-livesync-config
        globalMounts:
          - path: /opt/couchdb/etc/local.d/local.ini
            subPath: local.ini
            readOnly: true

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Selfhosted
          gethomepage.dev/name: Obsidian LiveSync
          gethomepage.dev/icon: obsidian.svg
          external-dns.alpha.kubernetes.io/target: "internal.${SECRET_DOMAIN}"
        hostnames:
          - "sync.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: obsidian-livesync
                namespace: selfhosted
                port: *port
