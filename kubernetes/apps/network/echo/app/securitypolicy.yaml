---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: echo-auth
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: echo
  extAuth:
    headersToExtAuth:
      - cookie
      - authorization
      - x-forwarded-for
      - x-forwarded-host
      - x-forwarded-proto
      - x-forwarded-uri
    http:
      backendRefs:
        - name: ak-outpost-authentik-embedded-outpost
          namespace: security
          port: 9000
      path: /outpost.goauthentik.io/auth/envoy
      headersToBackend:
        - set-cookie
        - authorization
        - x-authentik-username
        - x-authentik-email
        - x-authentik-name
        - x-authentik-uid
