---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
components:
  - ../../../../components/authentik-auth
patches:
  - target:
      kind: SecurityPolicy
      name: authentik-auth
    patch: |
      - op: replace
        path: /spec/targetRefs/0/name
        value: echo
