---
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: my-claw
  namespace: openclaw
spec:
  config:
    mergeMode: merge
    raw:
      agents:
        defaults:
          model:
            primary: "anthropic/claude-sonnet-4-6-20250514"
            fallbacks:
              - "anthropic/claude-opus-4-6-20250616"
              - "anthropic/claude-sonnet-4-20250514"
              - "anthropic/claude-opus-4-20250514"
              - "anthropic/claude-haiku-4-5-20251001"
              - "openai/gpt-5.4"
              - "gemini/gemini-2.5-pro"
              - "xai/grok-4-1-fast"
              - "deepseek/deepseek-chat"
              - "groq/llama-3.3-70b-versatile"
              - "mistral/mistral-large-latest"
              - "togetherai/Qwen/Qwen2.5-Coder-32B-Instruct"
              - "openrouter/openai/gpt-5.4"
              - "perplexity/sonar-pro"
      providers:
        anthropic:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/anthropic"
          api: "anthropic"
          models:
            - name: "claude-sonnet-4-20250514"
              contextWindow: 200000
              maxTokens: 16384
            - name: "claude-opus-4-6-20250616"
              contextWindow: 200000
              maxTokens: 32768
            - name: "claude-sonnet-4-6-20250514"
              contextWindow: 200000
              maxTokens: 16384
            - name: "claude-opus-4-20250514"
              contextWindow: 200000
              maxTokens: 32768
            - name: "claude-haiku-4-5-20251001"
              contextWindow: 200000
              maxTokens: 8192
        openai:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/openai"
          api: "openai"
        gemini:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/gemini"
          api: "openai"
        openrouter:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/openrouter"
          api: "openai"
        perplexity:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/perplexity"
          api: "openai"
        xai:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/xai"
          api: "openai"
        deepseek:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/deepseek"
          api: "openai"
        groq:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/groq"
          api: "openai"
        mistral:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/mistral"
          api: "openai"
        togetherai:
          baseUrl: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/togetherai"
          api: "openai"
      gateway:
        auth:
          mode: "token"
        controlUi:
          allowedOrigins:
            - "http://127.0.0.1:18789"
            - "http://localhost:18789"
            - "https://my-claw.${SECRET_DOMAIN}"
      session:
        scope: "per-sender"
      skills:
        install:
          preferBrew: false
          nodeManager: "pnpm"
        # entries:
        #   nano-banana-pro:
        #     enabled: true
        #     apiKey: "${GEMINI_API_KEY}"

  # ── Runtime Dependencies ──────────────────────────────────────
  # Init containers that install toolchains to the PVC
  # (persists across restarts, replaces brew for pnpm/python)
  runtimeDeps:
    pnpm: true
    python: true

  # ── Custom Init Containers ─────────────────────────────────────
  # Runs after built-in inits; installs tools to PVC
  initContainers:
    - name: install-tools
      image: ghcr.io/openclaw/openclaw:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -e
          BASE="/home/openclaw/.openclaw"
          export HOME="$$BASE"
          export XDG_CACHE_HOME="$$BASE/.cache"
          mkdir -p "$$BASE/.local/bin" "$$BASE/.cache" "$$BASE/.config"
          export PNPM_HOME="$$BASE/pnpm"
          export PATH="$$BASE/.local/bin:$$BASE/.bun/bin:$$BASE/go/sdk/bin:$$BASE/go/bin:$$PNPM_HOME:/usr/local/bin:/usr/bin:/bin"

          # ── Helper: install a single binary from URL ────────
          _install_bin() {
            local name="$$1" url="$$2"
            if [ -f "$$BASE/.local/bin/$$name" ]; then
              echo "$$name already installed, skipping"; return
            fi
            echo "Installing $$name..."
            curl -fsSL "$$url" -o "$$BASE/.local/bin/$$name"
            chmod +x "$$BASE/.local/bin/$$name"
          }

          # ── Direct binary downloads ─────────────────────────
          # gh CLI (extract from .deb)
          GH_VERSION="2.88.1"
          if [ ! -f "$$BASE/.local/bin/gh" ]; then
            echo "Installing gh $$GH_VERSION..."
            mkdir -p /tmp/gh-install
            curl -fsSL -o /tmp/gh-install/gh.deb \
              "https://github.com/cli/cli/releases/download/v$${GH_VERSION}/gh_$${GH_VERSION}_linux_amd64.deb"
            dpkg-deb -x /tmp/gh-install/gh.deb /tmp/gh-install
            cp /tmp/gh-install/usr/bin/gh "$$BASE/.local/bin/gh"
            rm -rf /tmp/gh-install
            echo "gh $$GH_VERSION installed"
          else
            echo "gh already installed, skipping"
          fi

          # jq
          _install_bin jq "https://github.com/jqlang/jq/releases/latest/download/jq-linux-amd64"

          # ripgrep (from musl tarball)
          RG_VERSION="14.1.1"
          if [ ! -f "$$BASE/.local/bin/rg" ]; then
            echo "Installing ripgrep $$RG_VERSION..."
            curl -fsSL "https://github.com/BurntSushi/ripgrep/releases/download/$${RG_VERSION}/ripgrep-$${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz" | \
              tar xz --strip-components=1 -C "$$BASE/.local/bin" "ripgrep-$${RG_VERSION}-x86_64-unknown-linux-musl/rg"
            echo "ripgrep $$RG_VERSION installed"
          else
            echo "rg already installed, skipping"
          fi

          # yt-dlp
          _install_bin yt-dlp "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux"

          # Go SDK (for go install commands later)
          GO_VERSION="1.24.1"
          if [ ! -d "$$BASE/go/sdk" ]; then
            echo "Installing Go $$GO_VERSION..."
            mkdir -p "$$BASE/go/sdk"
            curl -fsSL "https://go.dev/dl/go$${GO_VERSION}.linux-amd64.tar.gz" | \
              tar xz --strip-components=1 -C "$$BASE/go/sdk"
            echo "Go $$GO_VERSION installed"
          else
            echo "Go SDK already installed, skipping"
          fi
          export GOROOT="$$BASE/go/sdk"
          export GOPATH="$$BASE/go"

          # ── Bun ─────────────────────────────────────────────
          if ! command -v bun >/dev/null 2>&1; then
            echo "Installing Bun..."
            export BUN_INSTALL="$$BASE/.bun"
            curl -fsSL https://bun.sh/install | bash || echo "WARNING: Bun install failed, skipping"
          fi
          export PATH="$$BASE/.bun/bin:$$PATH"

          # Bun-based CLIs
          echo "Installing Bun-based CLIs..."
          bun install -g clawhub || true
          bun install -g mcporter || true
          bun install -g @steipete/oracle || true
          bun install -g @google/gemini-cli || true
          bun install -g @anthropic-ai/claude-code || true
          bun install -g @openai/codex || true
          bun install -g agent-browser || true

          # ── Go CLIs ─────────────────────────────────────────
          echo "Installing Go-based CLIs..."
          go install github.com/steipete/eightctl/cmd/eightctl@latest || true
          go install github.com/hueristiq/xurls/cmd/xurls@latest || true

          # ── UV tools ────────────────────────────────────────
          echo "Installing UV-based CLIs..."
          uv tool install nano-pdf || true

          # ── pip packages ────────────────────────────────────
          if command -v pip3 >/dev/null 2>&1; then
            pip3 install --user --break-system-packages kubernetes || true
          fi

          # ── Notion config ───────────────────────────────────
          if [ -n "$$NOTION_API_KEY" ]; then
            mkdir -p "$$HOME/.config/notion"
            echo "$$NOTION_API_KEY" > "$$HOME/.config/notion/api_key"
          fi

          # ── Google OAuth for gog ────────────────────────────
          if [ -f /secrets/google/client_secret.json ]; then
            echo "Setting up Google OAuth credentials for gog..."
            gog auth credentials /secrets/google/client_secret.json || true
          fi

          echo "Tool installation complete"
      envFrom:
        - secretRef:
            name: my-claw-skills-secret
      volumeMounts:
        - name: data
          mountPath: /home/openclaw/.openclaw
        - name: google-credentials
          mountPath: /secrets/google/client_secret.json
          subPath: client_secret.json
          readOnly: true

  # ── Skills ────────────────────────────────────────────────────
  # Fetched by init-skills container before the agent starts
  # Formats: "clawhub-slug" | "npm:package" | "pack:owner/repo/path"
  skills:
    - github
    - summarize
    - coding-agent
    - find-skills
    - notion
    - nano-banana-pro
    - gog
    - auto-updater
    - banana-farmer

  # ── Self-Configure ────────────────────────────────────────────
  # Let the agent add/remove skills and config at runtime via K8s API
  # (replaces brew-based interactive installs)
  selfConfigure:
    enabled: true
    allowedActions:
      - skills
      - config
      - workspaceFiles

  envFrom:
    - secretRef:
        name: my-claw-secret
    - secretRef:
        name: my-claw-skills-secret

  env:
    - name: OPENCLAW_DISABLE_BONJOUR
      value: "1"
    - name: ANTHROPIC_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/anthropic"
    - name: OPENAI_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/openai"
    - name: GEMINI_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/gemini"
    - name: XAI_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/xai"
    - name: DEEPSEEK_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/deepseek"
    - name: GROQ_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/groq"
    - name: MISTRAL_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/mistral"
    - name: TOGETHERAI_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/togetherai"
    - name: OPENROUTER_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/openrouter"
    - name: PERPLEXITY_BASE_URL
      value: "http://agentgateway-internal-noauth.ai-system.svc.cluster.local/perplexity"
    - name: PNPM_HOME
      value: "/home/openclaw/.openclaw/pnpm"
    - name: GH_CONFIG_DIR
      value: "/home/openclaw/.openclaw/.config/gh"
    - name: GOROOT
      value: "/home/openclaw/.openclaw/go/sdk"
    - name: GOPATH
      value: "/home/openclaw/.openclaw/go"
    - name: DISABLE_TELEMETRY
      value: "1"
    - name: PATH
      value: "/home/openclaw/.openclaw/.local/bin:/home/openclaw/.openclaw/.bun/bin:/home/openclaw/.openclaw/go/sdk/bin:/home/openclaw/.openclaw/go/bin:/home/openclaw/.openclaw/pnpm:/usr/local/bin:/usr/bin:/bin"

  gateway:
    existingSecret: my-claw-gateway-token
    controlUiOrigins: []

  extraVolumes:
    - name: google-credentials
      secret:
        secretName: my-claw-skills-secret
        items:
          - key: client_secret.json
            path: client_secret.json

  extraVolumeMounts:
    - name: google-credentials
      mountPath: /secrets/google/client_secret.json
      subPath: client_secret.json
      readOnly: true

  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - network
      allowDNS: true
    rbac:
      createServiceAccount: true

  storage:
    persistence:
      enabled: true
      existingClaim: my-claw

  sidecars:
    - name: code-server
      image: ghcr.io/coder/code-server:latest
      args:
        - --auth
        - none
        - --port
        - "8443"
        - --user-data-dir
        - /home/openclaw/.openclaw/.vscode-server
        - /home/openclaw/.openclaw
      ports:
        - containerPort: 8443
          name: http
          protocol: TCP
      volumeMounts:
        - name: data
          mountPath: /home/openclaw/.openclaw
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

  chromium:
    enabled: true

  probes:
    liveness:
      enabled: true
    readiness:
      enabled: true
    startup:
      enabled: true

  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
