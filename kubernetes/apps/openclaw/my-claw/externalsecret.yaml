---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: my-claw-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: my-claw-secret
    template:
      data:
        OPENCLAW_GATEWAY_PASSWORD: "{{ .OPENCLAW_GATEWAY_PASSWORD }}"
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY_MAX }}"
        ANTHROPIC_API_KEY_MAX: "{{ .ANTHROPIC_API_KEY_MAX }}"
        TELEGRAM_BOT_TOKEN: "{{ .OPENCLAW_TOKEN }}"
  dataFrom:
    - extract:
        key: openclaw
    - extract:
        key: ai-keys
    - extract:
        key: telegram
