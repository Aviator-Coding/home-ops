---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: ${APP}-dragonfly
spec:
  # renovate: datasource=docker depName=ghcr.io/dragonflydb/dragonfly
  image: ghcr.io/dragonflydb/dragonfly:v1.38.0
  replicas: 2
  args:
    # ~85% of limits.memory: leaves headroom for internal structures and the
    # snapshot fork's copy-on-write so eviction kicks in before OOMKill.
    # If limits.memory below changes, update this to match (limit * 0.85).
    - --maxmemory=435Mi
    - --proactor_threads=2
    - --cluster_mode=emulated
    # Cache-only policy: LRU-evict at maxmemory instead of returning OOM to clients.
    - --cache_mode=true
    - --default_lua_flags=allow-undeclared-keys
  resources:
    requests:
      # 2 proactor threads + admin/health; 100m was prone to throttling.
      cpu: 250m
      # = limits.memory => Guaranteed QoS, immune to node-pressure eviction.
      memory: 512Mi
    limits:
      memory: 512Mi
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: "kubernetes.io/hostname"
      whenUnsatisfiable: "DoNotSchedule"
      labelSelector:
        matchLabels:
          app.kubernetes.io/part-of: dragonfly
