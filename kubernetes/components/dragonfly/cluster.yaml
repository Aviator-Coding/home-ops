---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: ${APP}-dragonfly
spec:
  # renovate: datasource=docker depName=ghcr.io/dragonflydb/dragonfly
  image: ghcr.io/dragonflydb/dragonfly:v1.38.0
  replicas: 2
  args:
    # Dragonfly v1.38.0 enforces a 256 MiB-per-proactor-thread floor, so with
    # --proactor_threads=2 the minimum --maxmemory is 512Mi. limits.memory
    # below is sized 128Mi above that to leave runtime headroom (internal
    # structures, fork-on-snapshot, allocator slack).
    - --maxmemory=512Mi
    - --proactor_threads=2
    - --cluster_mode=emulated
    # Cache-only policy: LRU-evict at maxmemory instead of returning OOM to clients.
    - --cache_mode=true
    - --default_lua_flags=allow-undeclared-keys
  resources:
    requests:
      # 2 proactor threads + admin/health; 100m was prone to throttling.
      cpu: 250m
      # = limits.memory => Guaranteed QoS, immune to node-pressure eviction.
      memory: 640Mi
    limits:
      memory: 640Mi
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: "kubernetes.io/hostname"
      whenUnsatisfiable: "DoNotSchedule"
      labelSelector:
        matchLabels:
          app.kubernetes.io/part-of: dragonfly
