---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: my-claw-code-server
  namespace: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: my-claw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
      ports:
        - port: 8443
          protocol: TCP
