[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true, uv_create_args = [
  '--seed',
  '--system-site-packages',
] }
# Optional env file holding the 1Password service-account token for vals/op
# (e.g. OP_SERVICE_ACCOUNT_TOKEN). Gitignored; see .secrets.env.example.
_.file = ["{{config_root}}/.secrets.env"]
KUBECONFIG = "{{config_root}}/kubeconfig"
TALOSCONFIG = "{{config_root}}/talos/talosconfig"
# minijinja-cli config used by the `just` render path (talos/*.j2 templates)
MINIJINJA_CONFIG_FILE = "{{config_root}}/.minijinja.toml"
# `mod` imports in the root .justfile require unstable features on older `just`
JUST_UNSTABLE = "1"
MISE_LIST_ALL_VERSIONS = "false"

[tools]
"python" = "3.14.5"
"pipx:makejinja" = "2.8.2"
"pipx:pre-commit" = "4.6.0"
"pipx:flux-local" = "latest"
"just" = "latest"
"aqua:mitsuhiko/minijinja" = "latest"
"vals" = "latest"
"gum" = "latest"
"aqua:cilium/cilium-cli" = "0.19.4"
"aqua:cli/cli" = "2.93.0"
"aqua:cloudflare/cloudflared" = "2026.5.2"
"aqua:cue-lang/cue" = "0.16.1"
"aqua:fluxcd/flux2" = "2.8.8"
"aqua:go-task/task" = "3.51.1"
"aqua:helm/helm" = "4.2.0"
"aqua:helmfile/helmfile" = "1.5.2"
"aqua:jqlang/jq" = "1.7.1"
"aqua:kubernetes-sigs/kustomize" = "5.6.0"
"kubectl" = "1.36.2"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:siderolabs/talos" = "1.13.2"
"aqua:yannh/kubeconform" = "0.7.0"
"aqua:nektos/act" = "0.2.89"
uv = "0.11.19"
1password-cli = "2.30.3"
krew = "0.5.0"
k9s = "0.50.18"

[tasks.install-hooks]
description = "Install pre-commit hooks"
run = "pre-commit install --install-hooks && pre-commit install --hook-type commit-msg"
depends = ["install"]

[tasks.install]
description = "Install all tools and setup hooks"
run = "echo 'Tools installed via mise'"

[tasks.activate]
description = "Install all tools and setup hooks"
run = "eval \"$(mise activate zsh)\" "
