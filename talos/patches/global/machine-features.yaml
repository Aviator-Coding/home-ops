machine:
  features:
    kubernetesTalosAPIAccess:
      enabled: true
      allowedRoles:
        - os:admin
      allowedKubernetesNamespaces:
        - actions-runner-system
        - system-upgrade
    # Requires Cilium socketLB hostNamespaceOnly (enabled in cilium HelmRelease)
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: true
      resolveMemberNames: true
